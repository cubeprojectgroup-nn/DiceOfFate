<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кость Судьбы: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* === [ CSS: БАЗОВЫЕ СТИЛИ ] === */
        :root {
            --magic-color: #a29bfe;
            --friendly-green: #ccffcc;
            --angry-red: #ff6666;
            --sun-gold: #fff9ae;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 5px;
            background: radial-gradient(circle at center, #111b27 0%, #030508 100%);
            background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow-y: auto; position: relative; overflow-x: hidden;
            transition: background 1s ease;
        }

        .flash-red { animation: gunshot-flash 0.5s ease-out !important; }
        @keyframes gunshot-flash { 0% { background: #ffffff; } 10% { background: #ff0000; } 100% { background: radial-gradient(circle at center, #111b27 0%, #030508 100%); } }

        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .history::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        /* === [ CSS: ФОН И УМНЫЕ ЗВЕЗДЫ ] === */
        .stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none; opacity: 0; transition: opacity 1s ease, background-image 1s ease; z-index: -100; background-repeat: repeat; background-size: 200px 200px; }
        .stars-active { opacity: 1; }
        
        .bg1-stars { background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 90px 40px, #fff, rgba(0,0,0,0)); }
        .bg2-stars { background-image: radial-gradient(1px 1px at 20px 30px, #ccffcc, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 40px 70px, #55ff55, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #99ff99, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 90px 40px, #aaffaa, rgba(0,0,0,0)); }
        .bg3-stars { background-image: radial-gradient(1px 1px at 20px 30px, #e6ccff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 40px 70px, #aa55ff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #cc99ff, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 90px 40px, #d4aaff, rgba(0,0,0,0)); }
        .bg4-stars { background-image: radial-gradient(1px 1px at 20px 30px, #cce6ff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 40px 70px, #55aaff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #99ccff, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 90px 40px, #aaccff, rgba(0,0,0,0)); }
        .bg5-stars { background-image: radial-gradient(1px 1px at 20px 30px, #ffcccc, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 40px 70px, #ff5555, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ff9999, rgba(0,0,0,0)), radial-gradient(2.5px 2.5px at 90px 40px, #ffaaaa, rgba(0,0,0,0)); }

        /* === [ CSS: ГЛАВНОЕ МЕНЮ (СТАРТОВЫЙ ЭКРАН) ] === */
        #mainMenuOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 400; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; transition: opacity 0.8s ease; }
        .menu-title-main { font-size: 38px; color: var(--angry-red); text-shadow: 0 0 15px var(--angry-red); margin-bottom: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: opacity 0.5s ease; }
        .cards-container { display: flex; gap: 20px; width: 90%; max-width: 380px; justify-content: center; transition: opacity 0.5s ease; }
        .game-card { flex: 1; background: rgba(5, 8, 15, 0.8); border: 2px solid var(--magic-color); border-radius: 20px; padding: 25px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(162, 155, 254, 0.2); position: relative; transition: transform 0.2s, box-shadow 0.2s; }
        .game-card#card-roulette { border-color: var(--angry-red); box-shadow: 0 0 15px rgba(255, 102, 102, 0.2); }
        .game-card:active { transform: scale(0.95); }
        .card-icon { font-size: 55px; color: white; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; height: 60px; pointer-events: none; }
        .card-title { font-size: 16px; color: white; font-weight: bold; text-align: center; pointer-events: none; }
        
        .card-selected { animation: select-card 0.8s forwards cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; z-index: 10; }
        .card-discarded { animation: discard-card 0.8s forwards cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; }
        .title-fade-out { opacity: 0 !important; }

        @keyframes select-card { 0% { transform: scale(1); opacity: 1; } 30% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px #ffffff; border-color: #ffffff; background: rgba(255,255,255,0.1); } 100% { transform: scale(1.4); opacity: 0; box-shadow: 0 0 80px #ffffff; border-color: #ffffff; background: rgba(255,255,255,0.2); } }
        @keyframes discard-card { 0% { transform: scale(1); opacity: 1; filter: blur(0px); } 100% { transform: scale(0.7) translateY(20px); opacity: 0; filter: blur(8px); } }

        /* === [ CSS: МЕНЮ: ЭЛЕМЕНТЫ (ЯЗЫК, TG, ВЕРСИЯ) ] === */
        .menu-top-bar { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 410; }
        .menu-icon-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.3s; padding: 5px; opacity: 0.8; }
        .menu-icon-btn:hover { color: var(--magic-color); opacity: 1; }
        .menu-footer-row { position: absolute; bottom: 10px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 410; }
        .menu-subtitle-row { display: flex; justify-content: space-between; width: 90%; max-width: 380px; margin-top: -2px; padding: 0 2px; box-sizing: border-box; }
        .menu-subtitle-row a, .menu-version { font-size: 10px; color: rgba(162, 155, 254, 0.6); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; }
        .menu-subtitle-row a:hover { color: var(--magic-color); }

        /* === [ CSS: ИНТЕРФЕЙС ИГРЫ (ОБЕРТКА) ] === */
        #gameUI { display: flex; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; opacity: 0; pointer-events: none; transition: opacity 1s ease; }
        #gameUI.game-ui-visible { opacity: 1; pointer-events: auto; }

        .top-bar { display: flex; justify-content: center; gap: 15px; margin: 5px 0 0 0; z-index: 100; }
        .icon-btn { background: rgba(162, 155, 254, 0.1); border: none; color: var(--magic-color); font-size: 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
        .icon-btn.active-magic { color: #ffffff !important; text-shadow: 0 0 10px white; background: rgba(162, 155, 254, 0.3); }

        .header-wrapper { display: inline-flex; flex-direction: column; margin: 2px 0 5px 0; }
        h1 { font-size: 32px; letter-spacing: 2px; margin: 0; padding: 0; color: var(--magic-color); text-shadow: 0 0 10px var(--magic-color); font-weight: bold; text-transform: uppercase; transition: opacity 0.2s ease; }
        
        .title-animating { animation: title-fade 0.2s ease-in-out; }
        @keyframes title-fade { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(0.9); } }

        .fade-out { opacity: 0 !important; transition: opacity 0.15s ease !important; pointer-events: none !important; }
        .fade-in { animation: popInFade 0.2s ease forwards !important; }
        @keyframes popInFade { 0% { opacity: 0; } 100% { opacity: 1; } }

        .subtitle-row { display: flex; justify-content: space-between; width: 100%; margin-top: -2px; padding: 0 2px; box-sizing: border-box; }
        .subtitle-row a, .subtitle-row span { font-size: 10px; color: rgba(162, 155, 254, 0.6); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; }
        .roulette-mode-active #current-mode-display { display: none !important; }

        .input-section { width: 90%; max-width: 350px; position: relative; z-index: 110; transition: all 0.5s ease; max-height: 100px; opacity: 1; margin: 10px 0 0 0; overflow: hidden; }
        .input-section.hidden { max-height: 0; opacity: 0; margin: 0; pointer-events: none; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid var(--magic-color); background: rgba(255, 255, 255, 0.05); color: #ffffff; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; -webkit-appearance: none; appearance: none; line-height: normal; }

        #error-msg { height: 20px; font-size: 16px; color: var(--friendly-green); margin-top: 5px; margin-bottom: 5px; opacity: 0; transition: opacity 0.3s; font-weight: bold; pointer-events: none; text-shadow: 0 0 8px var(--friendly-green); z-index: 110; position: relative; }
        .error-visible { opacity: 1 !important; }
        .error-pulse-active { animation: error-vibe 0.8s infinite ease-in-out; }
        @keyframes error-vibe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #answer-box { min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; font-weight: bold; position: relative; z-index: 100; overflow: visible; width: 100%; }
        #res-content { opacity: 0; transform: translateY(10px) scale(0.9); transition: opacity 0.5s ease, transform 0.5s ease, text-shadow 0.5s ease; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #res-content.visible { opacity: 1 !important; transform: translateY(0) scale(1); }
        
        .answer-main { display: block; line-height: 1.1; font-size: 32px; text-transform: uppercase; margin-bottom: 2px; text-align: center; } 
        .answer-sub { font-size: 46px; margin: 0; display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .answer-desc { display: block; font-size: 16px; margin-top: 2px; font-weight: normal; text-align: center;}

        .roulette-mode-active .answer-main, .roulette-mode-active .answer-desc { display: none !important; }
        .roulette-mode-active .answer-sub { font-size: 70px; margin-top: 10px; } 

        .heart-pulse { animation: heartbeat-double-pulse 0.7s ease-in-out; }
        @keyframes heartbeat-double-pulse { 0% { transform: scale(1); filter: drop-shadow(0 0 25px #ccffcc); } 20% { transform: scale(1.2); filter: drop-shadow(0 0 45px #ffffff); } 40% { transform: scale(1); filter: drop-shadow(0 0 25px #ccffcc); } 60% { transform: scale(1.15); filter: drop-shadow(0 0 40px #ffffff); } 100% { transform: scale(1); filter: drop-shadow(0 0 25px #ccffcc); } }
        .skull-aura { animation: aura-shot-pulse 0.8s ease-out; }
        @keyframes aura-shot-pulse { 0% { transform: scale(1); filter: drop-shadow(0 0 25px var(--angry-red)); } 40% { transform: scale(1.25); filter: drop-shadow(0 0 70px red); } 100% { transform: scale(1); filter: drop-shadow(0 0 25px var(--angry-red)); } }

        body.yesno-mode-active #res-main, body.yesno-mode-active #res-desc { display: none !important; }

        .idle-mode { font-size: 18px; animation: color-cycle 6s infinite ease-in-out; opacity: 0; transform: translateY(5px); transition: opacity 0.8s ease, transform 0.8s ease; margin-top: 10px; pointer-events: none; }
        .idle-mode.visible { opacity: 1; transform: translateY(0); }
        @keyframes color-cycle { 0%, 100% { color: var(--friendly-green); text-shadow: 0 0 8px var(--friendly-green); } 50% { color: var(--angry-red); text-shadow: 0 0 8px var(--angry-red); } }
        
        body.roulette-mode-active #rouletteStage { height: 180px; margin-top: 25px; margin-bottom: 0px; } 
        body.roulette-mode-active #res-status { margin-top: 2px; margin-bottom: 10px; }
        body.roulette-mode-active #bulletStash { margin-bottom: 15px; }

        /* === [ ПЛАГИН 1 (КУБ) ] === */
        .stage { position: relative; width: 100%; height: 240px; display: flex; justify-content: center; align-items: center; perspective: 1200px; z-index: 50; margin: 2px 0 5px 0; touch-action: none; transition: opacity 0.4s; }
        .scene { width: 120px; height: 120px; position: relative; z-index: 60; transform-style: preserve-3d; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(20deg); }
        .face { position: absolute; width: 120px; height: 120px; background: rgba(26, 26, 46, 0.98); border: 2px solid var(--magic-color); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-radius: 22px; box-shadow: inset 0 0 20px rgba(162, 155, 254, 0.4); color: white; transition: background 2s ease, border 2s ease, color 0.5s ease; backface-visibility: visible; overflow: hidden; pointer-events: none; }
        .cube.classic-mode .face { background: #ffffff !important; color: #000000; border: 1px solid #ccc !important; box-shadow: none !important; opacity: 1 !important; }
        .f1 { transform: rotateY(0deg) translateZ(60px); } .f2 { transform: rotateX(-90deg) translateZ(60px); }
        .f3 { transform: rotateY(-90deg) translateZ(60px); } .f4 { transform: rotateY(90deg) translateZ(60px); }
        .f5 { transform: rotateX(90deg) translateZ(60px); } .f6 { transform: rotateY(180deg) translateZ(60px); }
        .dot-container { display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); width: 80%; height: 80%; padding: 5px; }
        .dot { background: currentColor; border-radius: 50%; width: 18px; height: 18px; align-self: center; justify-self: center; }

        /* === [ ПЛАГИН 2 (БАРАБАН) ] === */
        #rouletteStage { display: none; position: relative; width: 100%; height: 240px; justify-content: center; align-items: center; z-index: 50; margin: 2px 0 5px 0; perspective: 1000px; touch-action: none; transition: opacity 0.4s, height 0.3s ease; }
        
        .drum-wrapper { width: 180px; height: 180px; position: relative; color: var(--magic-color); filter: drop-shadow(0 0 15px var(--magic-color)); transition: color 0.8s ease, filter 0.8s ease; transform-style: preserve-3d; z-index: 20; }
        .drum-wrapper.classic { color: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        
        .drum-rotator { width: 100%; height: 100%; position: relative; transform-origin: center center; cursor: grab; transform-style: preserve-3d; }
        .drum-rotator:active { cursor: grabbing; }
        
        .drum-svg, .bullets-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
        
        .target-marker { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); color: var(--angry-red); font-size: 28px; filter: drop-shadow(0 0 8px var(--angry-red)); z-index: 60; }
        .survival-counter { position: absolute; top: 15px; left: calc(50% + 75px); color: var(--friendly-green); font-size: 28px; font-weight: bold; text-shadow: 0 0 10px var(--friendly-green); opacity: 0; transition: opacity 0.3s; z-index: 70; pointer-events: none; }
        .survival-counter.visible { opacity: 1; animation: pop-in 0.3s ease-out; }
        
        .chamber-slot { opacity: 0; transition: opacity 0.3s ease, filter 0.3s ease; }
        .chamber-slot.filled { opacity: 1; }
        .drum-wrapper:not(.classic) .chamber-slot.filled { filter: drop-shadow(0 0 10px #ffffff); }
        .drum-wrapper:not(.classic) .bullet-outer { fill: #ffffff; }
        .drum-wrapper:not(.classic) .bullet-inner { fill: #111b27; transition: fill 0.3s ease; } 
        .drum-wrapper:not(.classic) .chamber-slot.fired .bullet-inner { fill: #ffffff; } 
        .drum-wrapper.classic .chamber-slot.filled { filter: drop-shadow(0 0 8px var(--angry-red)); }
        .drum-wrapper.classic .bullet-outer { fill: var(--angry-red); }
        .drum-wrapper.classic .bullet-inner { fill: #ffffff; transition: fill 0.3s ease; }
        .drum-wrapper.classic .chamber-slot.fired .bullet-inner { fill: var(--angry-red); } 
        .hole-num { pointer-events: none; transform-origin: center center; transition: none; }

        #bulletStash { display: none; justify-content: center; gap: 24px; margin: 0 0 12px 0; height: 48px; transition: opacity 0.4s; }
        .stash-bullet { width: 24px; height: 48px; cursor: pointer; color: var(--sun-gold); transition: color 0.8s ease, transform 0.2s, opacity 0.3s; filter: drop-shadow(0 0 5px var(--sun-gold)); }
        body.classic-mode-active .stash-bullet { color: var(--angry-red); filter: drop-shadow(0 0 6px var(--angry-red)); }
        .stash-bullet:active { transform: scale(0.8); }
        .stash-bullet.loaded { opacity: 0; pointer-events: none; transform: translateY(-20px) scale(0.5); }

        /* === [ КНОПКИ ДЕЙСТВИЯ И ЭФФЕКТЫ ] === */
        .action-row { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; max-width: 350px; margin: 2px 0 10px 0; }
        .btn-roll, .btn-mini-roll { background: var(--magic-color); border: none; color: #000; font-weight: bold; cursor: pointer; transition: 0.4s; z-index: 110; box-shadow: 0 0 15px rgba(162, 155, 254, 0.3); touch-action: manipulation; }
        .btn-roll { padding: 12px 0; width: 100%; font-size: 16px; border-radius: 50px; text-transform: uppercase; flex-grow: 1; transition: color 0.3s, text-shadow 0.3s, background-color 0.4s; }
        .btn-mini-roll { width: 48px; height: 48px; border-radius: 50%; display: none; align-items: center; justify-content: center; flex-shrink: 0; padding: 10px; color: inherit; transition: opacity 0.4s; }
        .btn-roll:disabled, .btn-mini-roll:disabled { background: #4a457e !important; animation: pulse-btn 1.5s infinite ease-in-out !important; color: rgba(255, 255, 255, 0.5) !important; pointer-events: none; }
        .gold-text-active { animation: text-gold-pulse 1.5s infinite ease-in-out !important; color: #ffffff !important; }
        
        /* КЛАСС ДЛЯ ОШИБКИ КНОПКИ ("ПЫНЬ") */
        .text-error-flash { color: var(--angry-red) !important; text-shadow: 0 0 12px var(--angry-red) !important; }

        @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes text-gold-pulse { 0%, 100% { color: #ffffff; } 50% { color: var(--sun-gold); text-shadow: 0 0 12px var(--sun-gold); } }

        .sparkle { position: absolute; width: 5.3px; height: 5.3px; border-radius: 50%; opacity: 0; pointer-events: none; left: 50%; z-index: 10; }
        @keyframes sparkle-fly { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(var(--fly-x), var(--fly-y)) scale(0); } }

        /* === [ ОТЛАДКА И ИСТОРИЯ ] === */
        .debug-panel { display: none; justify-content: center; gap: 8px; margin: 5px 0 10px 0; width: 100%; max-width: 350px; }
        .debug-btn { width: 35px; height: 35px; border-radius: 50%; background: rgba(162, 155, 254, 0.1); border: 1px solid var(--magic-color); font-size: 14px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .debug-btn:active { background: var(--magic-color); color: #000; transform: scale(0.9); }

        .history-header { margin-top: 15px; width: 100%; max-width: 350px; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 10px; text-align: center; color: var(--magic-color); font-size: 11px; text-transform: uppercase; font-weight: bold; transition: opacity 0.2s ease; }
        .history { width: 100%; max-width: 350px; text-align: center; color: #888; overflow-y: auto; max-height: 120px; padding: 5px; flex-grow: 1; transition: opacity 0.4s; }
        .history-item { padding: 10px 0; font-size: 12px; position: relative; line-height: 1.4; border-bottom: 1px solid rgba(162, 155, 254, 0.1); }

        /* === [ ОКНА НАСТРОЕК И ПРАВИЛ ] === */
        .settings-overlay, .rules-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 1000; }
        .settings-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); }
        .rules-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .settings-modal { background: rgba(5, 8, 15, 0.95); border: 1px solid rgba(162, 155, 254, 0.3); padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; font-size: 15px; text-align: left; }
        .st-select { background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--magic-color); border-radius: 10px; padding: 5px; outline: none; width: 140px; font-family: inherit; font-size: 14px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.4); transition: .4s; border-radius: 34px; border: 1px solid var(--magic-color); }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 3px; background-color: var(--magic-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--magic-color); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #fff; }
        .close-btn { margin-top: 15px; background: var(--magic-color); border: none; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: bold; text-transform: uppercase; width: 100%; cursor: pointer; }
        
        .rules-content { text-align: left; font-size: 15px; line-height: 1.5; padding: 0 5px; max-height: 60vh; overflow-y: auto; }
        .rules-content::-webkit-scrollbar { width: 4px; }
        .rules-content::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .rules-content::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        .version { position: fixed; bottom: 5px; right: 8px; font-size: 10px; color: rgba(255, 255, 255, 0.15); pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

                const resSub = document.getElementById('res-sub');
                resSub.classList.remove('heart-pulse', 'skull-aura');
                isSpinningDrum = false; 

                if (isGunshotResult) { 
                    document.getElementById(`ch-${topChamberIdx}`).classList.add('fired');
                    resSub.classList.add('skull-aura'); 
                    uiColor = "#ff0000"; snd = 'gunshot'; subI = '<i class="fas fa-skull-crossbones"></i>'; 
                    document.body.classList.add('flash-red'); setTimeout(()=>document.body.classList.remove('flash-red'), 500); 
                    
                    if (tg.HapticFeedback) { 
                        tg.HapticFeedback.notificationOccurred('error'); 
                        setTimeout(() => tg.HapticFeedback.impactOccurred('heavy'), 50); 
                        setTimeout(() => tg.HapticFeedback.impactOccurred('heavy'), 150); 
                        setTimeout(() => tg.HapticFeedback.impactOccurred('rigid'), 300); 
                    } 
                    survivalCount = 0; document.getElementById('survivalCounter').classList.remove('visible');
                    histDispTxt = t.shotMsg;
                } else { 
                    resSub.classList.add('heart-pulse'); 
                    uiColor = "#ccffcc"; snd = 'safe_click'; subI = '<i class="fas fa-heart"></i>'; 
                    
                    if (tg.HapticFeedback) { 
                        tg.HapticFeedback.notificationOccurred('success'); 
                        setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 140);
                        setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 420);
                    } 
                    survivalCount++; const counterEl = document.getElementById('survivalCounter'); counterEl.innerText = '+' + survivalCount; counterEl.classList.remove('visible'); void counterEl.offsetWidth; counterEl.classList.add('visible');
                    histDispTxt = t.clickMsg;
                }

                document.getElementById('res-main').innerHTML = ""; document.getElementById('res-sub').innerHTML = subI; document.getElementById('res-desc').innerHTML = "";
                document.getElementById('res-sub').style.color = uiColor; document.getElementById('res-sub').style.textShadow = `0 0 25px ${uiColor}`;
                document.getElementById('res-content').style.color = uiColor; document.getElementById('res-content').style.textShadow = `0 0 15px ${uiColor}`;
                void document.getElementById('res-content').offsetWidth; document.getElementById('res-content').classList.add('visible');
                App.playSoundEffect('result', snd);

                const item = document.createElement('div'); item.className = 'history-item';
                const qMark = `<span style="color:#fff; font-weight:bold; text-shadow: 0 0 8px #fff, 0 0 15px var(--magic-color);">?</span>`;
                item.innerHTML = `${qMark} ${GameState.isQuestionHidden?'---':originalQuestion}<br><span style="color:${uiColor};">➔ ${subI} ${histDispTxt}</span>`;
                
                document.getElementById('historyListRoulette').prepend(item);

                if (isGunshotResult) {
                    setTimeout(() => {
                        reset();
                        rollBtn.disabled = false; rollBtn.innerText = t.rollBtn; rollBtn.classList.remove('gold-text-active');
                        miniBtn.disabled = false; miniBtn.classList.remove('gold-text-active');
                        document.getElementById('res-status').innerText = GameState.isQuestionHidden ? t.idleNoQ : t.idle; 
                        document.getElementById('res-status').classList.add('visible');
                    }, 3000);
                } else {
                    rollBtn.disabled = false; rollBtn.innerText = t.rollBtn; rollBtn.classList.remove('gold-text-active');
                    miniBtn.disabled = false; miniBtn.classList.remove('gold-text-active');
                    
                    setTimeout(() => { 
                        if(!rollBtn.disabled) { 
                            document.getElementById('res-status').innerText = GameState.isQuestionHidden ? t.idleNoQ : t.idle; 
                            document.getElementById('res-status').classList.add('visible'); 
                        } 
                    }, 4000);
                }
            }

            return { init, mount, unmount, play, loadBullet, spinRandomly, reset, isDragging: () => isDragging, isSpinning: () => isSpinningDrum };
        })();

        // ЗАПУСК ЯДРА
        App.init();

    </script>
</body>
</html>
