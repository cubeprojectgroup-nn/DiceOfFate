<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кость Судьбы: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* === [ CSS: БАЗОВЫЕ СТИЛИ ] === */
        :root {
            --magic-color: #a29bfe;
            --friendly-green: #ccffcc;
            --angry-red: #ff6666;
            --sun-gold: #fff9ae;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 5px;
            background: radial-gradient(circle at center, #111b27 0%, #030508 100%);
            background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow-y: auto; position: relative; overflow-x: hidden;
            transition: background 1s ease;
        }

        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .history::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        /* === [ CSS: ФОН И ЗВЕЗДЫ ] === */
        .stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none; opacity: 0; transition: opacity 1s ease; z-index: -100; }
        .stars-active { opacity: 1; background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; }

        /* === [ CSS: ИНТЕРФЕЙС И КНОПКИ ] === */
        .top-bar { display: flex; justify-content: center; gap: 20px; margin: 5px 0 0 0; z-index: 100; }
        .icon-btn { background: rgba(162, 155, 254, 0.1); border: none; color: var(--magic-color); font-size: 22px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn.active-magic { color: #ffffff !important; text-shadow: 0 0 10px white; background: rgba(162, 155, 254, 0.3); }

        .header-wrapper { display: inline-flex; flex-direction: column; margin: 2px 0 5px 0; }
        h1 { font-size: 32px; letter-spacing: 2px; margin: 0; padding: 0; color: var(--magic-color); text-shadow: 0 0 10px var(--magic-color); font-weight: bold; text-transform: uppercase; }
        .subtitle-row { display: flex; justify-content: space-between; width: 100%; margin-top: -2px; padding: 0 2px; box-sizing: border-box; }
        .subtitle-row a, .subtitle-row span { font-size: 10px; color: rgba(162, 155, 254, 0.6); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; }
        
        .input-section { width: 90%; max-width: 350px; position: relative; z-index: 110; transition: all 0.5s ease; max-height: 100px; opacity: 1; margin: 10px 0 0 0; overflow: hidden; }
        .input-section.hidden { max-height: 0; opacity: 0; margin: 0; pointer-events: none; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid var(--magic-color); background: rgba(255, 255, 255, 0.05); color: white; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; }

        #error-msg { height: 20px; font-size: 16px; color: var(--friendly-green); margin-top: 5px; opacity: 0; transition: opacity 0.3s; font-weight: bold; pointer-events: none; text-shadow: 0 0 8px var(--friendly-green); }
        .error-visible { opacity: 1 !important; }
        .error-pulse-active { animation: error-vibe 0.8s infinite; }
        @keyframes error-vibe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #answer-box { min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 5px 0 0 0; font-weight: bold; position: relative; z-index: 100; overflow: visible; width: 100%; }
        #res-content { opacity: 0; transform: translateY(10px) scale(0.9); transition: opacity 0.5s ease, transform 0.5s ease, text-shadow 0.5s ease; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #res-content.visible { opacity: 1 !important; transform: translateY(0) scale(1); }
        .answer-main { line-height: 1.1; font-size: 32px; text-transform: uppercase; margin-bottom: 2px; }
        .answer-sub { font-size: 46px; margin: 0; display: flex; align-items: center; justify-content: center; }
        .answer-desc { font-size: 16px; margin-top: 2px; font-weight: normal; }

        .idle-mode { font-size: 18px; animation: color-cycle 6s infinite ease-in-out; opacity: 0; transform: translateY(5px); transition: opacity 0.8s ease, transform 0.8s ease; margin-top: 10px; pointer-events: none; }
        .idle-mode.visible { opacity: 1; transform: translateY(0); }
        @keyframes color-cycle { 0%, 100% { color: var(--friendly-green); text-shadow: 0 0 8px var(--friendly-green); } 50% { color: var(--angry-red); text-shadow: 0 0 8px var(--angry-red); } }

        /* === [ CSS: КУБ И АНИМАЦИИ ] === */
        .stage { position: relative; width: 100%; height: 240px; display: flex; justify-content: center; align-items: center; perspective: 1200px; z-index: 50; margin: 2px 0 5px 0; touch-action: none; }
        .scene { width: 120px; height: 120px; position: relative; z-index: 60; transform-style: preserve-3d; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(20deg); }
        .face { position: absolute; width: 120px; height: 120px; background: rgba(26, 26, 46, 0.98); border: 2px solid var(--magic-color); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-radius: 22px; box-shadow: inset 0 0 20px rgba(162, 155, 254, 0.4); color: white; transition: background 2s ease, border 2s ease, color 0.5s ease; backface-visibility: visible; overflow: hidden; pointer-events: none; }
        .cube.classic-mode .face { background: #ffffff !important; color: #000000; border: 1px solid #ccc !important; box-shadow: none !important; opacity: 1 !important; }
        .f1 { transform: rotateY(0deg) translateZ(60px); } .f2 { transform: rotateX(-90deg) translateZ(60px); }
        .f3 { transform: rotateY(-90deg) translateZ(60px); } .f4 { transform: rotateY(90deg) translateZ(60px); }
        .f5 { transform: rotateX(90deg) translateZ(60px); } .f6 { transform: rotateY(180deg) translateZ(60px); }
        .dot-container { display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); width: 80%; height: 80%; padding: 5px; }
        .dot { background: currentColor; border-radius: 50%; width: 18px; height: 18px; align-self: center; justify-self: center; }

        .sparkle { position: absolute; width: 5.3px; height: 5.3px; border-radius: 50%; opacity: 0; pointer-events: none; top: 50%; left: 50%; z-index: 10; }
        @keyframes sparkle-fly { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(var(--fly-x), var(--fly-y)) scale(0); } }

        .btn-roll { padding: 12px 50px; font-size: 16px; background: var(--magic-color); border: none; color: #000; border-radius: 50px; font-weight: bold; text-transform: uppercase; z-index: 110; box-shadow: 0 0 15px rgba(162, 155, 254, 0.3); transition: 0.4s; min-width: 260px; margin: 2px 0 10px 0; cursor: pointer; }
        .btn-roll:disabled { background: #4a457e; animation: pulse-btn 1.5s infinite ease-in-out !important; }

        /* === [ CSS: ОТЛАДКА И ИСТОРИЯ ] === */
        .debug-panel { display: none; justify-content: center; gap: 8px; margin: 5px 0 10px 0; width: 100%; max-width: 350px; }
        .debug-btn { width: 35px; height: 35px; border-radius: 50%; background: rgba(162, 155, 254, 0.1); border: 1px solid var(--magic-color); font-size: 14px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .debug-btn:active { background: var(--magic-color); color: #000; transform: scale(0.9); }

        .gold-text-active { animation: text-gold-pulse 1.5s infinite ease-in-out !important; color: #ffffff !important; }
        @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes text-gold-pulse { 0%, 100% { color: #ffffff; } 50% { color: var(--sun-gold); text-shadow: 0 0 12px var(--sun-gold); } }

        .history-header { margin-top: 15px; width: 100%; max-width: 350px; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 10px; text-align: center; color: var(--magic-color); font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .history { width: 100%; max-width: 350px; text-align: center; color: #888; overflow-y: auto; max-height: 120px; padding: 5px; flex-grow: 1; }
        .history-item { padding: 10px 0; font-size: 12px; position: relative; line-height: 1.4; border-bottom: 1px solid rgba(162, 155, 254, 0.1); }

        /* === [ CSS: НАСТРОЙКИ ] === */
        .settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .settings-modal { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.2); padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; font-size: 15px; text-align: left; }
        .st-select { background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--magic-color); border-radius: 10px; padding: 5px; outline: none; width: 140px; font-family: inherit; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.4); transition: .4s; border-radius: 34px; border: 1px solid var(--magic-color); }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 3px; background-color: var(--magic-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--magic-color); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #fff; }
        .close-btn { margin-top: 15px; background: var(--magic-color); border: none; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: bold; text-transform: uppercase; width: 100%; cursor: pointer; }
        .version { position: fixed; bottom: 5px; right: 8px; font-size: 10px; color: rgba(255, 255, 255, 0.15); pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="stars" class="stars-layer stars-active"></div>
    <div class="version">v0.9.8.1</div>

    <div class="top-bar">
        <button class="icon-btn" id="toggleQuestionBtn" onclick="toggleQuestionField()"><i class="fas fa-question-circle"></i></button>
        <button class="icon-btn" id="cubeBtn" onclick="toggleCubeStyle()"><i class="fas fa-dice-d6"></i></button>
        <button class="icon-btn" id="soundBtn" onclick="toggleSound()"><i class="fas fa-volume-up"></i></button>
        <button class="icon-btn" onclick="toggleSettings(true)"><i class="fas fa-cog"></i></button>
    </div>

    <div class="header-wrapper">
        <h1 id="ui-title">Кость Судьбы</h1>
        <div class="subtitle-row">
            <a href="https://t.me/Antis_Corpus">t.me/Antis_Corpus</a>
            <span id="current-mode-display">ТОЧКИ</span>
        </div>
    </div>

    <div class="input-section" id="inputWrapper"><input type="text" id="userQuestion" placeholder="Введи вопрос судьбе..." autocomplete="off"><div id="error-msg">Сперва задай вопрос оракулу!</div></div>

    <div class="stage" id="mainStage"><div class="scene"><div id="cube" class="cube">
        <div class="face f1" id="face1"></div><div class="face f2" id="face2"></div><div class="face f3" id="face3"></div>
        <div class="face f4" id="face4"></div><div class="face f5" id="face5"></div><div class="face f6" id="face6"></div>
    </div></div></div>
    
    <div id="answer-box">
        <div id="res-content"><div id="res-main" class="answer-main"></div><div id="res-sub" class="answer-sub"></div><div id="res-desc" class="answer-desc"></div></div>
        <div id="res-status" class="idle-mode visible">Оракул ожидает вопроса...</div>
    </div>

    <button class="btn-roll" id="rollBtn" onclick="askOracle()">Испытать судьбу</button>

    <div class="debug-panel" id="debugPanel">
        <button class="debug-btn" onclick="askOracle(0)">1</button><button class="debug-btn" onclick="askOracle(1)">2</button><button class="debug-btn" onclick="askOracle(2)">3</button><button class="debug-btn" onclick="askOracle(3)">4</button><button class="debug-btn" onclick="askOracle(4)">5</button><button class="debug-btn" onclick="askOracle(5)">6</button>
    </div>

    <div class="history-header" id="st-hist-head">История предсказаний</div>
    <div class="history" id="historyBlock"><div id="historyList"></div></div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <h2 id="st-title-h2" style="margin-top:0; color:var(--magic-color)">Настройки</h2>
            <div class="setting-item"><span id="st-label-mode">Режим кости</span><select class="st-select" id="modeSelect" onchange="updateCubeFaces(); updateModeDisplay();"></select></div>
            <div class="setting-item"><span id="st-label-bg">Фон</span><select class="st-select" id="bgSelect" onchange="changeBackground()"></select></div>
            <div class="setting-item"><span id="st-label-sparkles">Магические искры</span><label class="switch"><input type="checkbox" id="sparkleToggle" checked><span class="slider"></span></label></div>
            <div class="setting-item"><span id="st-label-debug">Отладка</span><label class="switch"><input type="checkbox" id="debugToggle" onchange="toggleDebug()"><span class="slider"></span></label></div>
            <div class="setting-item"><span id="st-label-lang">Язык</span><select class="st-select" id="langSelect" onchange="changeLanguage()"><option value="ru">Русский</option><option value="en">English</option></select></div>
            <button class="close-btn" id="st-btn-close" onclick="toggleSettings(false)">Закрыть</button>
        </div>
    </div>

    <script>
        // === [ МОДУЛЬ: БАЗОВЫЕ ПЕРЕМЕННЫЕ И ИНИЦИАЛИЗАЦИЯ ] ===
        const tg = window.Telegram.WebApp; tg.expand();
        const cube = document.getElementById('cube'), ansStatus = document.getElementById('res-status'), ansContent = document.getElementById('res-content'), rollBtn = document.getElementById('rollBtn');
        const resMain = document.getElementById('res-main'), resSub = document.getElementById('res-sub'), resDesc = document.getElementById('res-desc');
        const historyList = document.getElementById('historyList'), userInput = document.getElementById('userQuestion'), errorMsg = document.getElementById('error-msg'), debugPanel = document.getElementById('debugPanel');
        
        let isSoundEnabled = true, isClassicCube = false, currentLang = 'ru', currentFaces = [], isQuestionHidden = false;
        let audioCtx = null;

        // Состояние вращения куба
        let currentRotX = -20;
        let currentRotY = 20;

        // === [ МОДУЛЬ: ДАННЫЕ И ЛОКАЛИЗАЦИЯ ] ===
        const translations = {
            ru: { title: "Кость Судьбы", placeholder: "Введи вопрос судьбе...", error: "Сперва задай вопрос оракулу!", idle: "Оракул ожидает вопроса...", waiting: "Судьба решает...", rollBtn: "Испытать судьбу", stTitle: "Настройки", stClose: "Закрыть", bg1: "Глубокий Космос", bg2: "Изумрудный Лес", bg3: "Аметистовая Ночь", bg4: "Океанская Бездна", bg5: "Тень Оракула", traderFaces: ["ПАМП", "ДАМП", "ЛОНГ", "ШОРТ", "ФЛЭТ", "СКАМ"], alcoFaces: ["ВИНО", "ПИВО", "КОКТЕЙЛЬ", "КРЕПКОЕ", "НАСТОЙКА", "ВОДА"], stMode: "Режим кости", stBg: "Фон", stSparkles: "Магические искры", stDebug: "Отладка", stLang: "Язык", stHist: "История предсказаний", modeDots: "Точки", modeNums: "Числа", modeYN: "Да/Нет", modeTrader: "Трейдер", modeAlco: "Алконавт", yn: ["НЕТ", "ДА", "НЕТ", "ДА", "НЕТ", "ДА"] },
            en: { title: "Dice of Fate", placeholder: "Ask your destiny...", error: "Ask the oracle first!", idle: "Oracle is waiting...", waiting: "Fate is deciding...", rollBtn: "Try your fate", stTitle: "Settings", stClose: "Close", bg1: "Deep Space", bg2: "Emerald Forest", bg3: "Amethyst Night", bg4: "Ocean Abyss", bg5: "Oracle Shadow", traderFaces: ["PUMP", "DUMP", "LONG", "SHORT", "FLAT", "SCAM"], alcoFaces: ["WINE", "BEER", "COCKTAIL", "SPIRITS", "TINCTURE", "WATER"], stMode: "Dice Mode", stBg: "Background", stSparkles: "Magic Sparkles", stDebug: "Debug", stLang: "Language", stHist: "Prediction History", modeDots: "Dots", modeNums: "Numbers", modeYN: "Yes/No", modeTrader: "Trader", modeAlco: "Alconaut", yn: ["NO", "YES", "NO", "YES", "NO", "YES"] }
        };

        const traderIcons = ['<i class="fas fa-rocket"></i>', '<i class="fas fa-arrow-trend-down"></i>', '<i class="fas fa-chart-line"></i>', '<i class="fas fa-chart-area" style="transform: scaleY(-1)"></i>', '<i class="fas fa-arrows-left-right"></i>', '<i class="fas fa-skull"></i>'];
        const alcoIcons = ['<i class="fas fa-wine-glass-alt"></i>', '<i class="fas fa-beer-mug-empty"></i>', '<i class="fas fa-glass-martini-alt"></i>', '<i class="fas fa-whiskey-glass"></i>', '<i class="fas fa-vial"></i>', '<i class="fas fa-droplet"></i>'];
        const resData = { ru: [ {t:"НЕТ...", s:"Слабо"}, {t:"ДА...", s:"Неуверенно"}, {t:"НЕТ.", s:"Средне"}, {t:"ДА!", s:"Средне"}, {t:"НЕТ!!!", s:"Максимально"}, {t:"ДА!!!", s:"Абсолютно"} ], en: [ {t:"NO...", s:"Weakly"}, {t:"YES...", s:"Unsure"}, {t:"NO.", s:"Medium"}, {t:"YES!", s:"Medium"}, {t:"NO!!!", s:"Absolutely"}, {t:"YES!!!", s:"Absolutely"} ] };
        const bgThemes = { bg1: { grad: "radial-gradient(circle at center, #111b27 0%, #030508 100%)", stars: true }, bg2: { grad: "linear-gradient(to bottom, #143a24 0%, #051109 100%)", stars: false }, bg3: { grad: "radial-gradient(circle at center, #2a1b35 0%, #0f0914 100%)", stars: false }, bg4: { grad: "radial-gradient(circle at center, #1b2a35 0%, #091014 100%)", stars: false }, bg5: { grad: "radial-gradient(circle at center, #111111 0%, #000000 100%)", stars: false } };

        // === [ МОДУЛЬ: ФИЗИКА И СВАЙПЫ КУБИКА ] ===
        let isDragging = false;
        let lastX, lastY;
        let velocityX = 0, velocityY = 0;
        let inertiaFrame;
        let lastTapTime = 0;
        let lastMoveTime = 0;

        const stage = document.getElementById('mainStage');

        function handlePointerDown(e) {
            if (rollBtn.disabled) return; 
            
            const now = Date.now();
            if (now - lastTapTime < 300) {
                if (!rollBtn.disabled) askOracle();
                return;
            }
            lastTapTime = now;

            isDragging = true;
            cancelAnimationFrame(inertiaFrame);
            cube.style.transition = 'none'; 

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            lastX = clientX;
            lastY = clientY;
            velocityX = 0;
            velocityY = 0;
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const deltaX = clientX - lastX;
            const deltaY = clientY - lastY;
            
            // Расчет переворота осей (если куб вверх ногами)
            let normX = currentRotX % 360;
            if (normX < 0) normX += 360;
            let isFlipped = (normX > 90 && normX < 270);
            
            currentRotY += (isFlipped ? -deltaX : deltaX) * 0.5;
            currentRotX -= deltaY * 0.5;
            
            cube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            
            velocityX = deltaX;
            velocityY = deltaY;
            lastMoveTime = Date.now();
            
            lastX = clientX;
            lastY = clientY;
        }

        function handlePointerUp() {
            if (!isDragging) return;
            isDragging = false;
            
            // Анти-фриз: если палец задержался перед отпусканием
            if (Date.now() - lastMoveTime > 100) {
                velocityX = 0;
                velocityY = 0;
            }
            
            applyInertia(); 
        }

        function applyInertia() {
            if (Math.abs(velocityX) < 0.05 && Math.abs(velocityY) < 0.05) return;
            
            let normX = currentRotX % 360;
            if (normX < 0) normX += 360;
            let isFlipped = (normX > 90 && normX < 270);
            
            currentRotY += (isFlipped ? -velocityX : velocityX) * 0.5;
            currentRotX -= velocityY * 0.5;
            cube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            
            // Как по маслу (очень низкое трение)
            velocityX *= 0.98;
            velocityY *= 0.98;
            
            inertiaFrame = requestAnimationFrame(applyInertia);
        }

        stage.addEventListener('mousedown', handlePointerDown);
        document.addEventListener('mousemove', handlePointerMove, {passive: false});
        document.addEventListener('mouseup', handlePointerUp);
        stage.addEventListener('touchstart', handlePointerDown, {passive: false});
        document.addEventListener('touchmove', handlePointerMove, {passive: false});
        document.addEventListener('touchend', handlePointerUp);

        // === [ МОДУЛЬ: ЗВУКИ ] ===
        async function playSoundEffect(type, resultType = 'positive') {
            if (!isSoundEnabled) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const playNode = (freq, typeNode, gainVal, dur) => {
                const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = typeNode; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(gainVal, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            };

            if (type === 'click') { playNode(150, 'sine', 0.5, 0.5); }
            else if (type === 'result') {
                if (resultType === 'positive') { playNode(880, 'sine', 0.2, 0.8); }
                else if (resultType === 'scam') { 
                    const o = audioCtx.createOscillator(), gn = audioCtx.createGain();
                    o.type = 'sawtooth'; o.frequency.setValueAtTime(100, audioCtx.currentTime);
                    gn.gain.setValueAtTime(0.3, audioCtx.currentTime); gn.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
                    o.connect(gn); gn.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 1.5);
                }
                else if (resultType === 'negative') { playNode(220, 'sawtooth', 0.15, 0.3); }
                else if (resultType === 'alco') { 
                    [0, 0.2, 0.45, 0.7].forEach((t, i) => {
                        setTimeout(() => {
                            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(300 + (i*50), audioCtx.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                            osc.connect(g); g.connect(audioCtx.destination);
                            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                        }, t * 1000);
                    });
                }
                else if (resultType === 'water') { 
                    [0, 0.2, 0.4].forEach((t) => {
                        setTimeout(() => {
                            const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.15);
                            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                            osc.connect(g); g.connect(audioCtx.destination);
                            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                        }, t * 1000);
                    });
                }
            }
        }

        // === [ МОДУЛЬ: ЛОГИКА ОРАКУЛА И ИНТЕРФЕЙСА ] ===
        userInput.addEventListener('input', () => errorMsg.classList.remove('error-visible', 'error-pulse-active'));
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') userInput.blur(); });

        function updateCubeFaces() {
            const mode = document.getElementById('modeSelect').value, t = translations[currentLang];
            currentFaces = []; const ynOrder = currentLang === 'ru' ? ["НЕТ", "ДА", "НЕТ", "ДА", "НЕТ", "ДА"] : ["NO", "YES", "NO", "YES", "NO", "YES"];
            for(let i=1; i<=6; i++) {
                const face = document.getElementById(`face${i}`);
                face.style.textShadow = ""; face.style.color = isClassicCube ? "#000" : "#fff";
                if(mode === 'yesno') { face.innerHTML = ynOrder[i-1]; face.style.fontSize = "32px"; currentFaces.push(ynOrder[i-1]); }
                else if(mode === 'trader') { face.innerHTML = t.traderFaces[i-1]; face.style.fontSize = "22px"; currentFaces.push(t.traderFaces[i-1]); }
                else if(mode === 'alco') { face.innerHTML = t.alcoFaces[i-1]; face.style.fontSize = i===3 ? "16px" : "20px"; currentFaces.push(t.alcoFaces[i-1]); }
                else if(mode === 'numbers') { face.innerHTML = i; face.style.fontSize = "55px"; currentFaces.push(i); }
                else if(mode === 'dots') {
                    const dp = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
                    let d = '<div class="dot-container">';
                    for(let j=0; j<9; j++) d += dp[i].includes(j) ? '<div class="dot"></div>' : '<div></div>';
                    face.innerHTML = d + '</div>'; currentFaces.push(i);
                }
            }
        }

        async function askOracle(forcedIdx = null) {
            const q = userInput.value.trim(), t = translations[currentLang], dMode = document.getElementById('modeSelect').value;
            if (!isQuestionHidden && !q && forcedIdx === null) {
                errorMsg.classList.add(errorMsg.classList.contains('error-visible') ? 'error-pulse-active' : 'error-visible');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                return;
            }
            if (rollBtn.disabled) return;
            
            cancelAnimationFrame(inertiaFrame);

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playSoundEffect('click'); 

            rollBtn.disabled = true; rollBtn.innerText = t.waiting; rollBtn.classList.add('gold-text-active');
            ansContent.classList.remove('visible'); ansStatus.classList.remove('visible');
            updateCubeFaces();
            
            const rollDuration = 6000 + Math.random() * 2000;
            const rIdx = forcedIdx !== null ? forcedIdx : Math.floor(Math.random() * 6);
            const targetRots = [{x:0,y:0},{x:90,y:0},{x:0,y:90},{x:0,y:-90},{x:-90,y:0},{x:0,y:180}];
            const offX = (Math.random() * 40 - 20), offY = (Math.random() * 40 - 20);
            
            // Расчет броска от текущего угла (чтобы не было рывков)
            const spins = 3600;
            const baseRotX = Math.round(currentRotX / 360) * 360;
            const baseRotY = Math.round(currentRotY / 360) * 360;
            
            currentRotX = baseRotX + spins + targetRots[rIdx].x + offX;
            currentRotY = baseRotY + spins + targetRots[rIdx].y + offY;
            
            const scaleDuration = rollDuration - 1500;
            cube.style.transition = `transform ${rollDuration / 1000}s cubic-bezier(0.15, 0, 0.15, 1), scale ${(scaleDuration / 2) / 1000}s ease-out`;
            cube.style.scale = "1.3";
            
            setTimeout(() => {
                cube.style.transition = `transform ${rollDuration / 1000}s cubic-bezier(0.15, 0, 0.15, 1), scale ${(scaleDuration / 2) / 1000}s ease-in`;
                cube.style.scale = "1";
            }, scaleDuration / 2);

            cube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            
            if (tg.HapticFeedback) {
                const startHapticTime = Date.now();
                const rollHaptics = () => {
                    const elapsed = Date.now() - startHapticTime;
                    if (elapsed >= rollDuration - 200) return; 
                    const progress = elapsed / rollDuration;
                    
                    if (progress < 0.3) tg.HapticFeedback.impactOccurred('heavy');
                    else if (progress < 0.7) tg.HapticFeedback.impactOccurred('medium');
                    else tg.HapticFeedback.impactOccurred('light');
                    
                    const nextTick = 50 + (progress * 250); 
                    setTimeout(rollHaptics, nextTick);
                };
                rollHaptics();
            }

            const originalQuestion = q; if (!isQuestionHidden) userInput.value = ''; 
            if (document.getElementById('sparkleToggle').checked) { for(let i=0;i<150;i++) createSparkle(); }

            setTimeout(() => {
                let isSuccess = (rIdx % 2 !== 0), uiColor = isSuccess ? "#ccffcc" : "#ff6666", snd = 'positive';
                if(dMode === 'trader') {
                    uiColor = (rIdx === 0 || rIdx === 2 || rIdx === 4) ? "#ccffcc" : "#ff6666";
                    if (rIdx === 4) uiColor = "#ffffff";
                    if (rIdx === 5) { uiColor = "#ff0000"; snd = 'scam'; }
                    else snd = (rIdx === 0 || rIdx === 2 || rIdx === 4) ? 'positive' : 'negative';
                } else if(dMode === 'alco') {
                    uiColor = ["#ff5e62", "#ffbd69", "#d4fc79", "#f9f586", "#96fbc4", "#a29bfe"][rIdx];
                    snd = (rIdx === 5) ? 'water' : 'alco';
                } else snd = isSuccess ? 'positive' : 'negative';

                const f = document.getElementById(`face${rIdx + 1}`);
                f.style.color = uiColor; f.style.textShadow = `0 0 20px ${uiColor}`;
                resMain.innerHTML = ""; resSub.innerHTML = ""; resDesc.innerHTML = "";
                ansContent.style.color = uiColor; ansContent.style.textShadow = `0 0 15px ${uiColor}`;

                if (dMode === 'trader') {
                    resSub.innerHTML = traderIcons[rIdx];
                } else if (dMode === 'alco') {
                    resSub.innerHTML = alcoIcons[rIdx];
                } else if (dMode === 'yesno') {
                    resSub.innerHTML = isSuccess ? '<i class="fas fa-check"></i>' : '<i class="fas fa-times"></i>';
                } else {
                    resMain.innerHTML = resData[currentLang][rIdx].t;
                    resDesc.innerHTML = resData[currentLang][rIdx].s;
                }

                void ansContent.offsetWidth; ansContent.classList.add('visible');
                playSoundEffect('result', snd);

                if (tg.HapticFeedback) {
                    if (snd === 'scam') {
                        tg.HapticFeedback.notificationOccurred('error');
                    } else if (snd === 'water') {
                        setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 0);
                        setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 200);
                        setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 400);
                    } else {
                        tg.HapticFeedback.impactOccurred('light'); 
                    }
                }

                const mName = document.getElementById('modeSelect').options[document.getElementById('modeSelect').selectedIndex].text;
                const item = document.createElement('div'); item.className = 'history-item';
                let hDisp = dMode==='trader'?`${traderIcons[rIdx]} ${t.traderFaces[rIdx]}`:(dMode==='alco'?`${alcoIcons[rIdx]} ${t.alcoFaces[rIdx]}`:(dMode==='yesno'?(isSuccess?'✅':'❌')+' '+currentFaces[rIdx]:(dMode==='numbers'?(rIdx+1)+' ➔ '+resData[currentLang][rIdx].t+' ('+resData[currentLang][rIdx].s+')':resData[currentLang][rIdx].t+' ('+resData[currentLang][rIdx].s+')')));
                item.innerHTML = `<span style="color:#fff; font-weight:bold;">?</span> ${isQuestionHidden?'---':originalQuestion} <span style="color:#aaa; font-size:11px;">[${mName}]</span><br><span style="color:${uiColor};">➔ ${hDisp}</span>`;
                historyList.prepend(item);

                rollBtn.disabled = false; rollBtn.innerText = translations[currentLang].rollBtn; rollBtn.classList.remove('gold-text-active');
                setTimeout(() => { if(!rollBtn.disabled) { ansStatus.classList.add('visible'); } }, 3000);
            }, rollDuration);
        }

        // === [ МОДУЛЬ: ЭФФЕКТЫ И УПРАВЛЕНИЕ ] ===
        function createSparkle() {
            const s = document.createElement('div'); s.className = 'sparkle'; mainStage.appendChild(s); 
            const angle = Math.random() * Math.PI * 2, dist = 130 + Math.random() * 120;
            s.style.background = Math.random() > 0.5 ? '#e0ffe0' : '#ffe0e0';
            s.style.setProperty('--fly-x', `${Math.cos(angle)*dist}px`); s.style.setProperty('--fly-y', `${Math.sin(angle)*dist}px`);
            const dur = 4.0 + Math.random() * 2.0; s.style.animation = `sparkle-fly ${dur}s ease-out forwards`;
            setTimeout(() => s.remove(), dur * 1000);
        }

        function toggleDebug() {
            document.getElementById('debugPanel').style.display = document.getElementById('debugToggle').checked ? 'flex' : 'none';
        }

        function toggleQuestionField() {
            isQuestionHidden = !isQuestionHidden;
            document.getElementById('inputWrapper').classList.toggle('hidden', isQuestionHidden);
            const btn = document.getElementById('toggleQuestionBtn');
            btn.classList.toggle('active-magic', isQuestionHidden);
            btn.innerHTML = isQuestionHidden ? '<i class="fas fa-comment-slash"></i>' : '<i class="fas fa-question-circle"></i>';
            ansContent.classList.remove('visible'); ansStatus.classList.remove('visible');
            setTimeout(() => ansStatus.classList.add('visible'), 50);
        }

        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById('soundBtn');
            btn.classList.toggle('active-magic', !isSoundEnabled);
            btn.innerHTML = isSoundEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        }

        function toggleCubeStyle() {
            isClassicCube = !isClassicCube;
            cube.classList.toggle('classic-mode', isClassicCube);
            const btn = document.getElementById('cubeBtn');
            btn.classList.toggle('active-magic', isClassicCube);
            btn.innerHTML = isClassicCube ? '<i class="fas fa-cube"></i>' : '<i class="fas fa-dice-d6"></i>';
            updateCubeFaces();
        }

        function fillBgOptions() {
            const sel = document.getElementById('bgSelect'); const cur = sel.value; sel.innerHTML = '';
            for(let i=1; i<=5; i++) {
                const opt = document.createElement('option'); opt.value = 'bg' + i;
                opt.innerText = translations[currentLang]['bg' + i]; if(opt.value === cur) opt.selected = true; sel.appendChild(opt);
            }
        }

        function fillModeOptions() {
            const sel = document.getElementById('modeSelect'); const val = sel.value;
            sel.innerHTML = `<option value="dots">${translations[currentLang].modeDots}</option><option value="numbers">${translations[currentLang].modeNums}</option><option value="yesno">${translations[currentLang].modeYN}</option><option value="trader">${translations[currentLang].modeTrader}</option><option value="alco">${translations[currentLang].modeAlco}</option>`;
            if(val) sel.value = val;
        }

        function updateModeDisplay() {
            const sel = document.getElementById('modeSelect');
            const disp = document.getElementById('current-mode-display');
            if (sel && disp && sel.options[sel.selectedIndex]) {
                disp.innerText = sel.options[sel.selectedIndex].text;
            }
        }

        function changeBackground() { const theme = bgThemes[document.getElementById('bgSelect').value || 'bg1']; document.body.style.background = theme.grad; }
        function toggleSettings(show) { document.getElementById('settingsOverlay').style.display = show ? 'flex' : 'none'; }
        
        function changeLanguage() { 
            currentLang = document.getElementById('langSelect').value; const t = translations[currentLang];
            document.getElementById('ui-title').innerText = t.title; userInput.placeholder = t.placeholder;
            document.getElementById('st-title-h2').innerText = t.stTitle; document.getElementById('st-btn-close').innerText = t.stClose;
            document.getElementById('st-label-mode').innerText = t.stMode; document.getElementById('st-label-bg').innerText = t.stBg;
            document.getElementById('st-label-sparkles').innerText = t.stSparkles; document.getElementById('st-label-debug').innerText = t.stDebug;
            document.getElementById('st-label-lang').innerText = t.stLang; document.getElementById('st-hist-head').innerText = t.stHist;
            if(!rollBtn.disabled) rollBtn.innerText = t.rollBtn; 
            fillModeOptions(); fillBgOptions(); updateCubeFaces(); updateModeDisplay();
        }
        
        fillModeOptions(); fillBgOptions(); updateCubeFaces(); updateModeDisplay(); changeBackground(); ansStatus.classList.add('visible');
    </script>
</body>
</html>
