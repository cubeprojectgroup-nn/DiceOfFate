<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кость Судьбы: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --magic-color: #a29bfe;
            --bg-color: #090a0f;
            --friendly-green: #ccffcc;
            --dark-green: #2e7d32;
            --angry-red: #ff6666;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 5px;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow-y: auto; position: relative;
        }

        /* СКРОЛЛБАР */
        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .history::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        .top-bar { display: flex; justify-content: center; gap: 25px; margin: 15px 0; width: 100%; z-index: 100; }
        .icon-btn {
            background: none; border: none; color: var(--magic-color);
            font-size: 24px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(162, 155, 254, 0.1);
        }
        .icon-btn.active { color: white; text-shadow: 0 0 10px white; }

        .settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .settings-modal {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px; border-radius: 30px; width: 85%; max-width: 320px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; font-size: 14px; text-align: left; }
        .st-select { background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--magic-color); border-radius: 10px; padding: 5px; outline: none; width: 130px; font-family: inherit; }

        h1 { font-size: 32px; letter-spacing: 2px; margin: 5px 0; color: var(--magic-color); text-shadow: 0 0 10px var(--magic-color); font-weight: bold; text-transform: uppercase; }
        .input-section { margin: 10px 0 5px 0; width: 90%; max-width: 350px; position: relative; z-index: 110; }
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 25px; border: 2px solid var(--magic-color);
            background: rgba(255, 255, 255, 0.05); color: white; font-size: 16px; outline: none; text-align: center; box-sizing: border-box;
        }

        #error-msg { height: 20px; font-size: 16px; color: var(--friendly-green); margin-top: 5px; opacity: 0; transition: 0.3s; font-weight: bold; }
        .error-mode { opacity: 1 !important; }

        #answer-box { height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 2px 0; font-weight: bold; position: relative; z-index: 100; }
        .idle-mode { font-size: 18px; animation: color-cycle 6s infinite ease-in-out; }

        @keyframes color-cycle {
            0%, 100% { color: var(--friendly-green); text-shadow: 0 0 8px var(--friendly-green); }
            50% { color: var(--angry-red); text-shadow: 0 0 8px var(--angry-red); }
        }

        .stage { position: relative; width: 100%; height: 240px; display: flex; justify-content: center; align-items: center; perspective: 1200px; z-index: 50; margin: 5px 0; }
        .scene { width: 120px; height: 120px; position: relative; z-index: 60; transform-style: preserve-3d; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1), scale 0.6s ease-out; transform: rotateX(-20deg) rotateY(20deg); z-index: 70; scale: 1; }
        .face { 
            position: absolute; width: 120px; height: 120px; background: rgba(26, 26, 46, 0.95); 
            border: 2px solid var(--magic-color); display: flex; align-items: center; justify-content: center; 
            font-size: 55px; font-weight: bold; border-radius: 22px; box-shadow: inset 0 0 20px rgba(162, 155, 254, 0.4); 
            color: white; transition: background 2s ease, border 2s ease, color 0.5s ease, text-shadow 0.5s ease; 
            backface-visibility: visible; overflow: hidden;
        }
        .cube.classic-mode .face { background: #ffffff !important; color: #000000; border: 1px solid #ccc !important; box-shadow: none !important; text-shadow: none; opacity: 1 !important; backface-visibility: hidden !important; }

        .f1 { transform: rotateY(0deg) translateZ(60px); } .f2 { transform: rotateX(-90deg) translateZ(60px); }
        .f3 { transform: rotateY(-90deg) translateZ(60px); } .f4 { transform: rotateY(90deg) translateZ(60px); }
        .f5 { transform: rotateX(90deg) translateZ(60px); } .f6 { transform: rotateY(180deg) translateZ(60px); }

        .dot-container { display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); width: 80%; height: 80%; padding: 5px; pointer-events: none; }
        .dot { background: currentColor; border-radius: 50%; width: 18px; height: 18px; align-self: center; justify-self: center; }

        /* ОТВЕТЫ ПОД КУБОМ */
        .answer-main { line-height: 1; font-size: 32px; }
        .answer-sub { font-size: 14px; opacity: 0.8; margin-top: 5px; font-weight: normal; }

        /* КНОПКА */
        .btn-roll { 
            padding: 12px 50px; font-size: 16px; background: var(--magic-color); border: none; color: #000; 
            border-radius: 50px; font-weight: bold; text-transform: uppercase; z-index: 110; 
            box-shadow: 0 0 15px rgba(162, 155, 254, 0.3); transition: 0.4s; min-width: 260px;
        }
        .btn-roll:disabled { 
            background: #4a457e; 
            animation: color-cycle 3s infinite ease-in-out, pulse-btn 1.5s infinite ease-in-out; 
        }
        @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .history-header { margin-top: 15px; width: 100%; max-width: 350px; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 10px; text-align: center; color: var(--magic-color); font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .history { width: 100%; max-width: 350px; text-align: center; color: #888; overflow-y: auto; max-height: 100px; padding: 5px; flex-grow: 1; }
        .history-item { padding: 8px 0; font-size: 12px; position: relative; }
        .history-item:not(:last-child):after { content: ""; position: absolute; bottom: 0; left: 10%; width: 80%; height: 1px; background: linear-gradient(to right, transparent, rgba(162, 155, 254, 0.15), transparent); }
        
        .q-mark { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 0 0 8px #fff, 0 0 15px var(--magic-color); margin-right: 5px; display: inline-block; }
        .mode-tag { color: #aaa; font-size: 11px; font-weight: bold; font-style: normal; margin-right: 5px; }

        /* МАГИЧЕСКИЕ ИСКРЫ */
        .sparkle { position: absolute; width: 4px; height: 4px; border-radius: 50%; opacity: 0; pointer-events: none; top: 50%; left: 50%; z-index: 1; }
        @keyframes sparkle-fly { 
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); } 
            100% { opacity: 0; transform: translate(var(--fly-x), calc(var(--fly-y) + 120px)) scale(0); } 
        }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 20px; border: 1px solid var(--magic-color); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 2px; background-color: var(--magic-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(16px); }

        .close-btn { margin-top: 15px; background: var(--magic-color); border: none; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: bold; text-transform: uppercase; }
        .version { position: fixed; bottom: 5px; right: 8px; font-size: 10px; color: rgba(255, 255, 255, 0.15); font-family: monospace; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <div class="version">v0.6.1</div>

    <div class="top-bar">
        <button class="icon-btn" id="cubeBtn" onclick="toggleCubeStyle()"><i class="fas fa-dice-d6"></i></button>
        <button class="icon-btn" id="soundBtn" onclick="toggleSound()"><i class="fas fa-volume-up"></i></button>
        <button class="icon-btn" onclick="toggleSettings(true)"><i class="fas fa-cog"></i></button>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <h2 id="st-title">Настройки</h2>
            <div class="setting-item">
                <span id="st-mode">Режим кости</span>
                <select class="st-select" id="modeSelect" onchange="updateCubeFaces()">
                    <option value="dots" id="opt-dots">Точки</option>
                    <option value="numbers" id="opt-num">Числа</option>
                    <option value="yesno" id="opt-yn">Да/Нет</option>
                </select>
            </div>
            <div class="setting-item">
                <span id="st-sparkles">Магические искры</span>
                <label class="switch"><input type="checkbox" id="sparkleToggle" checked><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <span id="st-lang">Язык</span>
                <select class="st-select" id="langSelect" onchange="changeLanguage()">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
            <button class="close-btn" id="st-close" onclick="toggleSettings(false)">Закрыть</button>
        </div>
    </div>

    <h1 id="ui-title">Кость Судьбы</h1>
    <div class="input-section">
        <input type="text" id="userQuestion" placeholder="Введи вопрос судьбе..." autocomplete="off">
        <div id="error-msg">Сперва задай вопрос оракулу!</div>
    </div>

    <div class="stage"><div class="scene"><div id="cube" class="cube">
        <div class="face f1" id="face1"></div>
        <div class="face f2" id="face2"></div>
        <div class="face f3" id="face3"></div>
        <div class="face f4" id="face4"></div>
        <div class="face f5" id="face5"></div>
        <div class="face f6" id="face6"></div>
    </div></div></div>
    
    <div id="answer-box" class="idle-mode">Оракул ждет вопроса...</div>
    <button class="btn-roll" id="rollBtn" onclick="askOracle()">Испытать судьбу</button>

    <div class="history-header" id="ui-history-title">История предсказаний</div>
    <div class="history" id="historyBlock"><div id="historyList"></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const cube = document.getElementById('cube');
        const ans = document.getElementById('answer-box');
        const rollBtn = document.getElementById('rollBtn');
        const historyList = document.getElementById('historyList');
        const userInput = document.getElementById('userQuestion');
        const errorMsg = document.getElementById('error-msg');
        
        let isSoundEnabled = true;
        let isClassicCube = false;
        let currentLang = 'ru';
        let currentFaces = [];
        let rolls = 0;

        const translations = {
            ru: {
                title: "Кость Судьбы", placeholder: "Введи вопрос судьбе...", error: "Сперва задай вопрос оракулу!",
                idle: "Оракул ждет вопроса...", waiting: "Судьба решает...", rollBtn: "Испытать судьбу",
                historyTitle: "История предсказаний", stTitle: "Настройки", stSparkles: "Магические искры",
                stLang: "Язык", stClose: "Закрыть", stMode: "Режим кости", optNum: "Числа", optYN: "Да/Нет", optDots: "Точки",
                yes: "ДА", no: "НЕТ"
            },
            en: {
                title: "Dice of Fate", placeholder: "Ask your destiny...", error: "Ask the oracle first!",
                idle: "Oracle is waiting...", waiting: "Fate is deciding...", rollBtn: "Roll the Dice",
                historyTitle: "Prediction History", stTitle: "Settings", stSparkles: "Magic Sparkles",
                stLang: "Language", stClose: "Close", stMode: "Dice Mode", optNum: "Numbers", optYN: "Yes/No", optDots: "Dots",
                yes: "YES", no: "NO"
            }
        };

        const resData = [
            {t:"НЕТ... (Слабо)", c:"#ff6666", w:false}, {t:"ДА... (Неуверенно)", c:"#ccffcc", w:true},
            {t:"НЕТ. (Средне)", c:"#ff6666", w:false}, {t:"ДА! (Средне)", c:"#ccffcc", w:true},
            {t:"НЕТ!!! (Максимально)", c:"#ff6666", w:false}, {t:"ДА!!! (Абсолютно)", c:"#ccffcc", w:true}
        ];

        const dotPatterns = { 1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8] };

        function getDotsHTML(num) {
            let dots = '<div class="dot-container">';
            for(let i=0; i<9; i++) { dots += dotPatterns[num].includes(i) ? '<div class="dot"></div>' : '<div></div>'; }
            return dots + '</div>';
        }

        function updateCubeFaces() {
            const mode = document.getElementById('modeSelect').value;
            const t = translations[currentLang];
            currentFaces = [];
            const ynOrder = [t.no, t.yes, t.no, t.yes, t.no, t.yes];
            for(let i=1; i<=6; i++) {
                const face = document.getElementById(`face${i}`);
                face.style.color = isClassicCube ? "#000" : "#fff";
                face.style.textShadow = "";
                if(mode === 'numbers') { face.innerHTML = i; face.style.fontSize = "55px"; currentFaces.push(i); }
                else if(mode === 'yesno') { face.innerHTML = ynOrder[i-1]; face.style.fontSize = (currentLang === 'ru') ? "40px" : "35px"; currentFaces.push(ynOrder[i-1]); }
                else if(mode === 'dots') { face.innerHTML = getDotsHTML(i); currentFaces.push(i); }
            }
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            const t = translations[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            userInput.placeholder = t.placeholder;
            errorMsg.innerText = t.error;
            document.getElementById('ui-history-title').innerText = t.historyTitle;
            rollBtn.innerText = rollBtn.disabled ? t.waiting : t.rollBtn;
            document.getElementById('st-title').innerText = t.stTitle;
            document.getElementById('st-sparkles').innerText = t.stSparkles;
            document.getElementById('st-lang').innerText = t.stLang;
            document.getElementById('st-close').innerText = t.stClose;
            document.getElementById('st-mode').innerText = t.stMode;
            document.getElementById('opt-num').innerText = t.optNum;
            document.getElementById('opt-yn').innerText = t.optYN;
            document.getElementById('opt-dots').innerText = t.optDots;
            updateCubeFaces();
            if (!rollBtn.disabled) ans.innerHTML = t.idle;
        }

        function toggleSettings(show) { document.getElementById('settingsOverlay').style.display = show ? 'flex' : 'none'; }
        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById('soundBtn');
            btn.innerHTML = isSoundEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
            btn.classList.toggle('active', !isSoundEnabled);
        }
        function toggleCubeStyle() {
            isClassicCube = !isClassicCube;
            cube.classList.toggle('classic-mode', isClassicCube);
            const btn = document.getElementById('cubeBtn');
            btn.style.color = isClassicCube ? '#fff' : 'var(--magic-color)';
            btn.classList.toggle('active', isClassicCube);
            updateCubeFaces();
        }

        userInput.addEventListener('input', () => { errorMsg.classList.remove('error-mode'); });

        function startFadingVibration(duration) {
            if (!tg.HapticFeedback) return;
            tg.HapticFeedback.impactOccurred('heavy');
            let startTime = Date.now();
            function vibrate() {
                let elapsed = Date.now() - startTime;
                if (elapsed >= duration) return;
                tg.HapticFeedback.impactOccurred('light');
                setTimeout(vibrate, 60 + (Math.pow(elapsed / duration, 2) * 500));
            }
            setTimeout(vibrate, 60);
        }

        function formatAnswer(text) {
            const parts = text.split(' (');
            if (parts.length > 1) {
                return `<div class="answer-main">${parts[0]}</div><div class="answer-sub">${parts[1].replace(')', '')}</div>`;
            }
            return `<div class="answer-main">${text}</div>`;
        }

        function createSparkle() {
            const s = document.createElement('div'); s.className = 'sparkle';
            document.querySelector('.stage').appendChild(s);
            s.style.background = Math.random() > 0.5 ? '#e0ffe0' : '#ffe0e0';
            const angle = Math.random() * Math.PI * 2; const dist = 100 + Math.random() * 100;
            s.style.setProperty('--fly-x', `${Math.cos(angle)*dist}px`);
            s.style.setProperty('--fly-y', `${Math.sin(angle)*dist}px`);
            const dur = 4.5 + Math.random() * 2.0; // Время жизни увеличено на 30%
            s.style.animation = `sparkle-fly ${dur}s ease-out forwards`;
            setTimeout(() => s.remove(), dur * 1000);
        }

        function askOracle() {
            const q = userInput.value.trim();
            const t = translations[currentLang];
            const diceMode = document.getElementById('modeSelect').value;
            if (!q) { errorMsg.classList.add('error-mode'); if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning'); return; }
            
            rollBtn.disabled = true;
            rollBtn.innerText = t.waiting;
            ans.innerHTML = ""; 
            for(let i=1; i<=6; i++) {
                const face = document.getElementById(`face${i}`);
                face.style.color = isClassicCube ? "#000" : "#fff";
                face.style.textShadow = "";
            }
            
            const rollDuration = 6000 + Math.floor(Math.random() * 6001);
            cube.style.transition = `transform ${rollDuration/1000}s cubic-bezier(0.15, 0, 0.15, 1), scale 0.6s ease-out`;
            cube.style.scale = "1.45"; 
            setTimeout(() => { cube.style.transition = `transform ${rollDuration/1000}s cubic-bezier(0.15, 0, 0.15, 1), scale ${(rollDuration-600)/1000}s ease-in-out`; cube.style.scale = "1"; }, 600);

            // ИСКРЫ (Количество увеличено на 30%)
            if (document.getElementById('sparkleToggle').checked) {
                for (let i = 0; i < 130; i++) createSparkle();
            }

            if (isSoundEnabled) {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const g = ctx.createGain();
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            }
            startFadingVibration(rollDuration);

            rolls++;
            const resIndex = Math.floor(Math.random() * 6);
            cube.style.transform = `rotateX(${rolls*3600 + [0,80,-10,-10,-100,-10][resIndex]}deg) rotateY(${rolls*3600 + [0,10,80,-80,10,170][resIndex]}deg)`;

            setTimeout(() => {
                const faceContent = currentFaces[resIndex];
                const isSuccess = (resIndex % 2 !== 0);
                const historyColor = isSuccess ? "#ccffcc" : "#ff6666";
                const uiColor = isSuccess ? (isClassicCube ? "#2e7d32" : "#ccffcc") : "#ff6666";

                if (diceMode === 'yesno') {
                    ans.innerHTML = "";
                    const winningFace = document.getElementById(`face${resIndex + 1}`);
                    winningFace.style.color = uiColor;
                    winningFace.style.textShadow = isClassicCube ? "none" : `0 0 15px ${uiColor}, 0 0 30px ${uiColor}`;
                } else {
                    ans.innerHTML = formatAnswer(resData[resIndex].t);
                    ans.style.color = uiColor; ans.style.textShadow = isClassicCube ? "none" : `0 0 10px ${uiColor}`;
                }

                if (isSoundEnabled) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator(); const g = ctx.createGain();
                    osc.frequency.setValueAtTime(isSuccess ? 880 : 220, ctx.currentTime);
                    const targetGain = isSuccess ? 0.24 : 1.0; 
                    g.gain.setValueAtTime(targetGain, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                    osc.connect(g); g.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 1);
                }
                
                const item = document.createElement('div');
                item.className = 'history-item';
                const modeName = document.getElementById('opt-' + (diceMode==='yesno'?'yn':(diceMode==='numbers'?'num':'dots'))).innerText;
                const hResText = (diceMode === 'yesno') ? faceContent : resData[resIndex].t;
                
                item.innerHTML = `<span class="q-mark">?</span><span class="mode-tag">[${modeName}]</span> ${q}<br><span style="color:${historyColor};">➔ ${hResText}</span>`;
                historyList.prepend(item);
                
                userInput.value = '';
                rollBtn.disabled = false;
                rollBtn.innerText = t.rollBtn;
            }, rollDuration);
        }
        updateCubeFaces();
    </script>
</body>
</html>
