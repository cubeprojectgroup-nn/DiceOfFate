<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кость Судьбы: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* === [ CSS: БАЗОВЫЕ СТИЛИ ] === */
        :root {
            --magic-color: #a29bfe;
            --friendly-green: #ccffcc;
            --angry-red: #ff6666;
            --sun-gold: #fff9ae;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 5px;
            background: radial-gradient(circle at center, #111b27 0%, #030508 100%);
            background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow-y: auto; position: relative; overflow-x: hidden;
            transition: background 1s ease;
        }

        .flash-red { animation: gunshot-flash 0.5s ease-out !important; }
        @keyframes gunshot-flash { 0% { background: #ffffff; } 10% { background: #ff0000; } 100% { background: radial-gradient(circle at center, #111b27 0%, #030508 100%); } }

        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .history::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        /* === [ CSS: ФОН И ЗВЕЗДЫ ] === */
        .stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none; opacity: 0; transition: opacity 1s ease; z-index: -100; }
        .stars-active { opacity: 1; background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; }

        /* === [ CSS: ИНТЕРФЕЙС И КНОПКИ ВЕРХНЕЙ ПАНЕЛИ ] === */
        .top-bar { display: flex; justify-content: center; gap: 15px; margin: 5px 0 0 0; z-index: 100; }
        .icon-btn { background: rgba(162, 155, 254, 0.1); border: none; color: var(--magic-color); font-size: 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
        .icon-btn.active-magic { color: #ffffff !important; text-shadow: 0 0 10px white; background: rgba(162, 155, 254, 0.3); }

        .header-wrapper { display: inline-flex; flex-direction: column; margin: 2px 0 5px 0; }
        h1 { font-size: 32px; letter-spacing: 2px; margin: 0; padding: 0; color: var(--magic-color); text-shadow: 0 0 10px var(--magic-color); font-weight: bold; text-transform: uppercase; transition: opacity 0.2s ease; }
        
        .title-animating { animation: title-fade 0.2s ease-in-out; }
        @keyframes title-fade { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0; transform: scale(0.9); } }

        .fade-out { opacity: 0 !important; transition: opacity 0.15s ease !important; pointer-events: none !important; }
        .fade-in { animation: popInFade 0.2s ease forwards !important; }
        @keyframes popInFade { 0% { opacity: 0; } 100% { opacity: 1; } }

        .subtitle-row { display: flex; justify-content: space-between; width: 100%; margin-top: -2px; padding: 0 2px; box-sizing: border-box; }
        .subtitle-row a, .subtitle-row span { font-size: 10px; color: rgba(162, 155, 254, 0.6); font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; }
        
        .roulette-mode-active #current-mode-display { display: none !important; }

        .input-section { width: 90%; max-width: 350px; position: relative; z-index: 110; transition: all 0.5s ease; max-height: 100px; opacity: 1; margin: 10px 0 0 0; overflow: hidden; }
        .input-section.hidden { max-height: 0; opacity: 0; margin: 0; pointer-events: none; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid var(--magic-color); background: rgba(255, 255, 255, 0.05); color: #ffffff; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; -webkit-appearance: none; appearance: none; line-height: normal; }

        #error-msg { height: 20px; font-size: 16px; color: var(--friendly-green); margin-top: 5px; margin-bottom: 5px; opacity: 0; transition: opacity 0.3s; font-weight: bold; pointer-events: none; text-shadow: 0 0 8px var(--friendly-green); z-index: 110; position: relative; }
        .error-visible { opacity: 1 !important; }
        .error-pulse-active { animation: error-vibe 0.8s infinite ease-in-out; }
        @keyframes error-vibe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* === [ CSS: ОТРИСОВКА РЕЗУЛЬТАТОВ И АНИМАЦИИ ] === */
        #answer-box { min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; font-weight: bold; position: relative; z-index: 100; overflow: visible; width: 100%; }
        #res-content { opacity: 0; transform: translateY(10px) scale(0.9); transition: opacity 0.5s ease, transform 0.5s ease, text-shadow 0.5s ease; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #res-content.visible { opacity: 1 !important; transform: translateY(0) scale(1); }
        
        .answer-main { display: block; line-height: 1.1; font-size: 32px; text-transform: uppercase; margin-bottom: 2px; text-align: center; } 
        .answer-sub { font-size: 46px; margin: 0; display: flex; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .answer-desc { display: block; font-size: 16px; margin-top: 2px; font-weight: normal; text-align: center;}

        .roulette-mode-active .answer-main, .roulette-mode-active .answer-desc { display: none !important; }
        /* Символ (сердце/череп) поднят ближе к барабану */
        .roulette-mode-active .answer-sub { font-size: 70px; margin-top: 10px; } 

        .heart-pulse { animation: heartbeat-double-pulse 0.7s ease-in-out; }
        @keyframes heartbeat-double-pulse { 
            0% { transform: scale(1); filter: drop-shadow(0 0 25px #ccffcc); } 20% { transform: scale(1.2); filter: drop-shadow(0 0 45px #ffffff); } 40% { transform: scale(1); filter: drop-shadow(0 0 25px #ccffcc); } 60% { transform: scale(1.15); filter: drop-shadow(0 0 40px #ffffff); } 100% { transform: scale(1); filter: drop-shadow(0 0 25px #ccffcc); } 
        }

        .skull-aura { animation: aura-shot-pulse 0.8s ease-out; }
        @keyframes aura-shot-pulse { 
            0% { transform: scale(1); filter: drop-shadow(0 0 25px var(--angry-red)); } 40% { transform: scale(1.25); filter: drop-shadow(0 0 70px red); } 100% { transform: scale(1); filter: drop-shadow(0 0 25px var(--angry-red)); } 
        }

        body.yesno-mode-active #res-main, body.yesno-mode-active #res-desc { display: none !important; }

        .idle-mode { font-size: 18px; animation: color-cycle 6s infinite ease-in-out; opacity: 0; transform: translateY(5px); transition: opacity 0.8s ease, transform 0.8s ease; margin-top: 10px; pointer-events: none; }
        .idle-mode.visible { opacity: 1; transform: translateY(0); }
        @keyframes color-cycle { 0%, 100% { color: var(--friendly-green); text-shadow: 0 0 8px var(--friendly-green); } 50% { color: var(--angry-red); text-shadow: 0 0 8px var(--angry-red); } }
        
        body.roulette-mode-active #rouletteStage { height: 180px; margin-top: 15px; margin-bottom: 0px; } 
        /* Текст ответа поднят выше */
        body.roulette-mode-active #res-status { margin-top: 2px; margin-bottom: 10px; }
        body.roulette-mode-active #bulletStash { margin-bottom: 15px; }

        /* === [ CSS: КУБ И АНИМАЦИИ ] === */
        .stage { position: relative; width: 100%; height: 240px; display: flex; justify-content: center; align-items: center; perspective: 1200px; z-index: 50; margin: 2px 0 5px 0; touch-action: none; transition: opacity 0.4s; }
        .scene { width: 120px; height: 120px; position: relative; z-index: 60; transform-style: preserve-3d; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(20deg); }
        .face { position: absolute; width: 120px; height: 120px; background: rgba(26, 26, 46, 0.98); border: 2px solid var(--magic-color); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-radius: 22px; box-shadow: inset 0 0 20px rgba(162, 155, 254, 0.4); color: white; transition: background 2s ease, border 2s ease, color 0.5s ease; backface-visibility: visible; overflow: hidden; pointer-events: none; }
        .cube.classic-mode .face { background: #ffffff !important; color: #000000; border: 1px solid #ccc !important; box-shadow: none !important; opacity: 1 !important; }
        .f1 { transform: rotateY(0deg) translateZ(60px); } .f2 { transform: rotateX(-90deg) translateZ(60px); }
        .f3 { transform: rotateY(-90deg) translateZ(60px); } .f4 { transform: rotateY(90deg) translateZ(60px); }
        .f5 { transform: rotateX(90deg) translateZ(60px); } .f6 { transform: rotateY(180deg) translateZ(60px); }
        .dot-container { display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); width: 80%; height: 80%; padding: 5px; }
        .dot { background: currentColor; border-radius: 50%; width: 18px; height: 18px; align-self: center; justify-self: center; }

        /* === [ CSS: РЕЖИМ РУЛЕТКИ ] === */
        #rouletteStage { display: none; position: relative; width: 100%; height: 240px; justify-content: center; align-items: center; z-index: 50; margin: 2px 0 5px 0; perspective: 1000px; touch-action: none; transition: opacity 0.4s, height 0.3s ease; }
        
        .drum-wrapper { width: 180px; height: 180px; position: relative; color: var(--magic-color); filter: drop-shadow(0 0 15px var(--magic-color)); transition: color 0.8s ease, filter 0.8s ease; transform-style: preserve-3d; }
        .drum-wrapper.classic { color: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        
        .drum-rotator { width: 100%; height: 100%; position: relative; transform-origin: center center; cursor: grab; transform-style: preserve-3d; }
        .drum-rotator:active { cursor: grabbing; }
        
        .drum-svg, .bullets-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
        
        .target-marker { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); color: var(--angry-red); font-size: 28px; filter: drop-shadow(0 0 8px var(--angry-red)); z-index: 60; }

        .survival-counter { position: absolute; top: 15px; left: calc(50% + 75px); color: var(--friendly-green); font-size: 28px; font-weight: bold; text-shadow: 0 0 10px var(--friendly-green); opacity: 0; transition: opacity 0.3s; z-index: 70; pointer-events: none; }
        .survival-counter.visible { opacity: 1; animation: pop-in 0.3s ease-out; }
        @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .chamber-slot { opacity: 0; transition: opacity 0.3s ease, filter 0.3s ease; }
        .chamber-slot.filled { opacity: 1; }
        
        .drum-wrapper:not(.classic) .chamber-slot.filled { filter: drop-shadow(0 0 10px #ffffff); }
        .drum-wrapper:not(.classic) .bullet-outer { fill: #ffffff; }
        .drum-wrapper:not(.classic) .bullet-inner { fill: #111b27; transition: fill 0.3s ease; } 
        .drum-wrapper:not(.classic) .chamber-slot.fired .bullet-inner { fill: #ffffff; } 

        .drum-wrapper.classic .chamber-slot.filled { filter: drop-shadow(0 0 8px var(--angry-red)); }
        .drum-wrapper.classic .bullet-outer { fill: var(--angry-red); }
        .drum-wrapper.classic .bullet-inner { fill: #ffffff; transition: fill 0.3s ease; }
        .drum-wrapper.classic .chamber-slot.fired .bullet-inner { fill: var(--angry-red); } 

        .hole-num { pointer-events: none; transform-origin: center center; transition: none; }

        /* УВЕЛИЧЕННЫЕ И РАЗДВИНУТЫЕ ПАТРОНЫ */
        #bulletStash { display: none; justify-content: center; gap: 24px; margin: 0 0 12px 0; height: 48px; transition: opacity 0.4s; }
        .stash-bullet { width: 24px; height: 48px; cursor: pointer; color: var(--sun-gold); transition: color 0.8s ease, transform 0.2s, opacity 0.3s; filter: drop-shadow(0 0 5px var(--sun-gold)); }
        body.classic-mode-active .stash-bullet { color: var(--angry-red); filter: drop-shadow(0 0 6px var(--angry-red)); }
        .stash-bullet:active { transform: scale(0.8); }
        .stash-bullet.loaded { opacity: 0; pointer-events: none; transform: translateY(-20px) scale(0.5); }

        /* === [ CSS: ГЛАВНЫЕ КНОПКИ ДЕЙСТВИЯ ] === */
        .action-row { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; max-width: 350px; margin: 2px 0 10px 0; }
        
        .btn-roll, .btn-mini-roll { 
            background: var(--magic-color); border: none; color: #000; font-weight: bold; cursor: pointer; transition: 0.4s; z-index: 110; 
            box-shadow: 0 0 15px rgba(162, 155, 254, 0.3); 
            touch-action: manipulation; 
        }
        .btn-roll { padding: 12px 0; width: 100%; font-size: 16px; border-radius: 50px; text-transform: uppercase; flex-grow: 1; }
        .btn-mini-roll { width: 48px; height: 48px; border-radius: 50%; display: none; align-items: center; justify-content: center; flex-shrink: 0; padding: 10px; color: inherit; transition: opacity 0.4s; }
        
        .btn-roll:disabled, .btn-mini-roll:disabled { background: #4a457e !important; animation: pulse-btn 1.5s infinite ease-in-out !important; color: rgba(255, 255, 255, 0.5) !important; pointer-events: none; }
        .gold-text-active { animation: text-gold-pulse 1.5s infinite ease-in-out !important; color: #ffffff !important; }

        @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes text-gold-pulse { 0%, 100% { color: #ffffff; } 50% { color: var(--sun-gold); text-shadow: 0 0 12px var(--sun-gold); } }

        .sparkle { position: absolute; width: 5.3px; height: 5.3px; border-radius: 50%; opacity: 0; pointer-events: none; top: 50%; left: 50%; z-index: 10; }
        @keyframes sparkle-fly { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(var(--fly-x), var(--fly-y)) scale(0); } }

        .debug-panel { display: none; justify-content: center; gap: 8px; margin: 5px 0 10px 0; width: 100%; max-width: 350px; }
        .debug-btn { width: 35px; height: 35px; border-radius: 50%; background: rgba(162, 155, 254, 0.1); border: 1px solid var(--magic-color); font-size: 14px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .debug-btn:active { background: var(--magic-color); color: #000; transform: scale(0.9); }

        .history-header { margin-top: 15px; width: 100%; max-width: 350px; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 10px; text-align: center; color: var(--magic-color); font-size: 11px; text-transform: uppercase; font-weight: bold; transition: opacity 0.2s ease; }
        .history { width: 100%; max-width: 350px; text-align: center; color: #888; overflow-y: auto; max-height: 120px; padding: 5px; flex-grow: 1; transition: opacity 0.4s; }
        .history-item { padding: 10px 0; font-size: 12px; position: relative; line-height: 1.4; border-bottom: 1px solid rgba(162, 155, 254, 0.1); }

        /* === [ CSS: ОКНА НАСТРОЕК И ПРАВИЛ ] === */
        .settings-overlay, .rules-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 1000; }
        .settings-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); }
        .rules-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        
        .settings-modal { background: rgba(5, 8, 15, 0.95); border: 1px solid rgba(162, 155, 254, 0.3); padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; font-size: 15px; text-align: left; }
        .st-select { background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--magic-color); border-radius: 10px; padding: 5px; outline: none; width: 140px; font-family: inherit; font-size: 14px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.4); transition: .4s; border-radius: 34px; border: 1px solid var(--magic-color); }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 3px; background-color: var(--magic-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--magic-color); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #fff; }
        .close-btn { margin-top: 15px; background: var(--magic-color); border: none; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: bold; text-transform: uppercase; width: 100%; cursor: pointer; }
        
        /* УВЕЛИЧЕННЫЙ ШРИФТ ПРАВИЛ (15px) */
        .rules-content { text-align: left; font-size: 15px; line-height: 1.5; padding: 0 5px; max-height: 60vh; overflow-y: auto; }
        .rules-content::-webkit-scrollbar { width: 4px; }
        .rules-content::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .rules-content::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        .version { position: fixed; bottom: 5px; right: 8px; font-size: 10px; color: rgba(255, 255, 255, 0.15); pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="stars" class="stars-layer stars-active"></div>
    <div class="version">v0.7.0.3</div>

    <div class="top-bar">
        <button class="icon-btn" id="toggleQuestionBtn" onclick="toggleQuestionField()"><i class="fas fa-question-circle"></i></button>
        <button class="icon-btn" id="cubeBtn" onclick="toggleCubeStyle()"><i class="fas fa-dice-d6"></i></button>
        <button class="icon-btn" id="soundBtn" onclick="toggleSound()"><i class="fas fa-volume-up"></i></button>
        <button class="icon-btn" id="modeToggleBtn" onclick="toggleGameMode()">
            <svg viewBox="0 0 20 50" style="height: 16px; width: auto; transform: translateY(1px);" fill="currentColor">
                <path d="M0,20 C0,5 10,0 10,0 C10,0 20,5 20,20 L20,50 L0,50 Z"/>
            </svg>
        </button>
        <button class="icon-btn" onclick="toggleSettings(true)"><i class="fas fa-cog"></i></button>
        <button class="icon-btn" onclick="toggleRules(true)">
            <svg viewBox="0 0 24 24" style="height: 18px; width: auto; transform: translateY(1px);" fill="currentColor">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 7h10v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2z"/>
            </svg>
        </button>
    </div>

    <div class="header-wrapper">
        <h1 id="ui-title">Кость Судьбы</h1>
        <div class="subtitle-row">
            <a href="https://t.me/Antis_Corpus">t.me/Antis_Corpus</a>
            <span id="current-mode-display">ТОЧКИ</span>
        </div>
    </div>

    <div class="input-section" id="inputWrapper"><input type="text" id="userQuestion" placeholder="Введи вопрос судьбе..." autocomplete="off"></div>
    <div id="error-msg">Сперва задай вопрос оракулу!</div>

    <div class="stage" id="mainStage">
        <div class="scene" id="cubeScene">
            <div id="cube" class="cube">
                <div class="face f1" id="face1"></div><div class="face f2" id="face2"></div><div class="face f3" id="face3"></div>
                <div class="face f4" id="face4"></div><div class="face f5" id="face5"></div><div class="face f6" id="face6"></div>
            </div>
        </div>
    </div>

    <div id="rouletteStage">
        <div class="target-marker"><i class="fas fa-caret-down"></i></div>
        <div class="survival-counter" id="survivalCounter"></div>
        <div class="drum-wrapper" id="drumWrapper">
            <div class="drum-rotator" id="drumRotator">
                <svg class="drum-svg" viewBox="0 0 200 200" style="overflow: visible;">
                    <defs>
                        <mask id="main-drum-mask" maskUnits="userSpaceOnUse" x="-100" y="-100" width="400" height="400">
                            <rect x="-100" y="-100" width="400" height="400" fill="white" />
                            <circle cx="100" cy="100" r="14" fill="black" />
                            <circle cx="100" cy="28" r="22" fill="black" />
                            <circle cx="162.35" cy="64" r="22" fill="black" />
                            <circle cx="162.35" cy="136" r="22" fill="black" />
                            <circle cx="100" cy="172" r="22" fill="black" />
                            <circle cx="37.65" cy="136" r="22" fill="black" />
                            <circle cx="37.65" cy="64" r="22" fill="black" />
                            <circle cx="150" cy="13.4" r="18" fill="black" />
                            <circle cx="200" cy="100" r="18" fill="black" />
                            <circle cx="150" cy="186.6" r="18" fill="black" />
                            <circle cx="50" cy="186.6" r="18" fill="black" />
                            <circle cx="0" cy="100" r="18" fill="black" />
                            <circle cx="50" cy="13.4" r="18" fill="black" />
                        </mask>
                    </defs>
                    <circle cx="100" cy="100" r="96" mask="url(#main-drum-mask)" fill="currentColor"/>
                </svg>
                
                <svg class="bullets-svg" viewBox="0 0 200 200" style="overflow: visible;">
                    <text x="100" y="34" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-weight="bold" class="hole-num" style="transform-origin: 100px 28px;">3</text>

                        resSub.classList.add('skull-aura'); 
                        uiColor = "#ff0000"; snd = 'gunshot'; subI = '<i class="fas fa-skull-crossbones"></i>'; 
                        document.body.classList.add('flash-red'); setTimeout(()=>document.body.classList.remove('flash-red'), 500); 
                        
                        if (tg.HapticFeedback) { 
                            tg.HapticFeedback.notificationOccurred('error'); 
                            setTimeout(() => tg.HapticFeedback.impactOccurred('heavy'), 50); 
                            setTimeout(() => tg.HapticFeedback.impactOccurred('heavy'), 150); 
                            setTimeout(() => tg.HapticFeedback.impactOccurred('rigid'), 300); 
                        } 
                        survivalCount = 0; document.getElementById('survivalCounter').classList.remove('visible');
                        histDispTxt = t.shotMsg;
                    } else { 
                        resSub.classList.add('heart-pulse'); 
                        uiColor = "#ccffcc"; snd = 'safe_click'; subI = '<i class="fas fa-heart"></i>'; 
                        
                        if (tg.HapticFeedback) { 
                            tg.HapticFeedback.notificationOccurred('success'); 
                            setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 140);
                            setTimeout(() => tg.HapticFeedback.impactOccurred('medium'), 420);
                        } 
                        survivalCount++; const counterEl = document.getElementById('survivalCounter'); counterEl.innerText = '+' + survivalCount; counterEl.classList.remove('visible'); void counterEl.offsetWidth; counterEl.classList.add('visible');
                        histDispTxt = t.clickMsg;
                    }
                    mTag = "";
                } else {
                    const selHistory = document.getElementById('modeSelect');
                    const curModeText = selHistory.options[selHistory.selectedIndex].text;
                    let histModeStrengthHistory = `[${curModeText}]`;

                    if (dMode === 'trader') { 
                        uiColor = (rIdx === 0 || rIdx === 2 || rIdx === 4) ? "#ccffcc" : "#ff6666"; 
                        if (rIdx === 4) uiColor = "#ffffff"; 
                        if (rIdx === 5) { uiColor = "#ff0000"; snd = 'scam'; } else snd = (rIdx === 0 || rIdx === 2 || rIdx === 4) ? 'positive' : 'negative'; 
                        subI = traderIcons[rIdx]; resT = ""; resD = ""; histDispTxt = t.traderFaces[rIdx]; 
                    } 
                    else if (dMode === 'alco') { 
                        uiColor = ["#ff5e62", "#ffbd69", "#d4fc79", "#f9f586", "#96fbc4", "#a29bfe"][rIdx]; snd = (rIdx === 5) ? 'water' : 'alco'; subI = alcoIcons[rIdx]; resT = ""; resD = ""; histDispTxt = t.alcoFaces[rIdx]; 
                    } 
                    else if (dMode === 'yesno') { 
                        snd = isSuccess ? 'positive' : 'negative'; subI = isSuccess ? '<i class="fas fa-check"></i>' : '<i class="fas fa-times"></i>'; resT = resData[currentLang][rIdx].t; resD = resData[currentLang][rIdx].s; histDispTxt = currentFaces[rIdx]; 
                        histModeStrengthHistory += ` [<span style="color:#ffffff; font-weight:bold;">${resData[currentLang][rIdx].s}</span>]`; 
                    } else { 
                        snd = isSuccess ? 'positive' : 'negative'; resT = resData[currentLang][rIdx].t; resD = resData[currentLang][rIdx].s; 
                        histDispTxt = `${resData[currentLang][rIdx].t} (<span style="color:${uiColor};">${resData[currentLang][rIdx].s}</span>)`; 
                        histModeStrengthHistory += ` [<span style="color:#ffffff; font-weight:bold;">${currentFaces[rIdx]}</span>]`; 
                    }
                    
                    mTag = ` <span style="color:#aaa; font-size:9px;">${histModeStrengthHistory}</span>`;
                    
                    const f = document.getElementById(`face${rIdx + 1}`); f.style.color = uiColor; f.style.textShadow = `0 0 20px ${uiColor}`;
                    if (tg.HapticFeedback) { if (snd === 'scam') { tg.HapticFeedback.notificationOccurred('error'); } else if (snd === 'water') { [0,200,400].forEach(delay=>setTimeout(()=>tg.HapticFeedback.impactOccurred('medium'),delay)); } else { tg.HapticFeedback.impactOccurred('light'); } }
                }

                resMain.innerHTML = resT; resSub.innerHTML = subI; resDesc.innerHTML = resD;
                resSub.style.color = uiColor; resSub.style.textShadow = `0 0 25px ${uiColor}`;
                ansContent.style.color = uiColor; ansContent.style.textShadow = `0 0 15px ${uiColor}`;
                void ansContent.offsetWidth; ansContent.classList.add('visible');
                playSoundEffect('result', snd);

                const item = document.createElement('div'); item.className = 'history-item';
                const qMark = `<span style="color:#fff; font-weight:bold; text-shadow: 0 0 8px #fff, 0 0 15px var(--magic-color);">?</span>`;
                item.innerHTML = `${qMark} ${isQuestionHidden?'---':originalQuestion}${mTag}<br><span style="color:${uiColor};">➔ ${subI} ${histDispTxt}</span>`;
                
                if (isRouletteMode) {
                    document.getElementById('historyListRoulette').prepend(item);
                } else {
                    document.getElementById('historyListDice').prepend(item);
                }

                if (isRouletteMode && isGunshotResult) {
                    setTimeout(() => {
                        resetRoulette();
                        rollBtn.disabled = false; rollBtn.innerText = t.rollBtn; rollBtn.classList.remove('gold-text-active');
                        miniDrumBtn.disabled = false; miniDrumBtn.classList.remove('gold-text-active');
                        ansStatus.innerText = isQuestionHidden ? translations[currentLang].idleNoQ : translations[currentLang].idle; 
                        ansStatus.classList.add('visible');
                    }, 3000);
                } else {
                    rollBtn.disabled = false; rollBtn.innerText = t.rollBtn; rollBtn.classList.remove('gold-text-active');
                    miniDrumBtn.disabled = false; miniDrumBtn.classList.remove('gold-text-active');
                    
                    const idleTimeout = (isRouletteMode) ? 4000 : 3000; 
                    setTimeout(() => { 
                        if(!rollBtn.disabled) { 
                            ansStatus.innerText = isQuestionHidden ? translations[currentLang].idleNoQ : translations[currentLang].idle; 
                            ansStatus.classList.add('visible'); 
                        } 
                    }, idleTimeout);
                }
            }
        }

        function createSparkle() { const s = document.createElement('div'); s.className = 'sparkle'; mainStage.appendChild(s); const angle = Math.random() * Math.PI * 2, dist = 120 + Math.random() * 100; s.style.background = Math.random() > 0.5 ? '#e0ffe0' : '#ffe0e0'; s.style.setProperty('--fly-x', `${Math.cos(angle)*dist}px`); s.style.setProperty('--fly-y', `${Math.sin(angle)*dist}px`); const dur = 3.0 + Math.random() * 2.0; s.style.animation = `sparkle-fly ${dur}s ease-out forwards`; setTimeout(() => s.remove(), dur * 1000); }
        function toggleDebug() { const d=document.getElementById('debugPanel'); d.style.display = document.getElementById('debugToggle').checked ? 'flex' : 'none'; if(isRouletteMode) resetRoulette(); } 
        
        function toggleQuestionField() { 
            isQuestionHidden = !isQuestionHidden; 
            document.getElementById('inputWrapper').classList.toggle('hidden', isQuestionHidden); 
            const btn = document.getElementById('toggleQuestionBtn'); 
            btn.classList.toggle('active-magic', isQuestionHidden); 
            btn.innerHTML = isQuestionHidden ? '<i class="fas fa-comment-slash"></i>' : '<i class="fas fa-question-circle"></i>'; 
            hideError(); 
            ansContent.classList.remove('visible'); ansStatus.classList.remove('visible'); 
            document.getElementById('res-status').innerText = isQuestionHidden ? translations[currentLang].idleNoQ : translations[currentLang].idle;
            setTimeout(() => ansStatus.classList.add('visible'), 50); 
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function toggleSound() { isSoundEnabled = !isSoundEnabled; const btn = document.getElementById('soundBtn'); btn.classList.toggle('active-magic', !isSoundEnabled); btn.innerHTML = isSoundEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>'; if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }
        
        function updateModeDisplay() {
            if (isRouletteMode) return;
            const sel = document.getElementById('modeSelect'); const disp = document.getElementById('current-mode-display');
            
            document.body.classList.toggle('yesno-mode-active', sel.value === 'yesno');
            
            if (sel && disp && sel.options[sel.selectedIndex]) { disp.innerText = sel.options[sel.selectedIndex].text; }
            updateCubeFaces(); hideError(); if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function toggleCubeStyle() { 
            isClassicCube = !isClassicCube; 
            cube.classList.toggle('classic-mode', isClassicCube); drumWrapper.classList.toggle('classic', isClassicCube); document.body.classList.toggle('classic-mode-active', isClassicCube);
            const btn = document.getElementById('cubeBtn'); btn.classList.toggle('active-magic', isClassicCube); btn.innerHTML = isClassicCube ? '<i class="fas fa-cube"></i>' : '<i class="fas fa-dice-d6"></i>'; 
            updateStyleBtnIcon();
            updateCubeFaces(); if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function updateStyleBtnIcon() {
            const btn = document.getElementById('cubeBtn');
            if (isRouletteMode) {
                btn.innerHTML = `<svg viewBox="0 0 200 200" style="height: 18px; width: auto;" fill="currentColor"><path fill-rule="evenodd" d="M 100,4 A 96,96 0 1,1 100,196 A 96,96 0 1,1 100,4 Z M 100,86 A 14,14 0 1,0 100,114 A 14,14 0 1,0 100,86 Z M 100,6 A 22,22 0 1,0 100,50 A 22,22 0 1,0 100,6 Z M 162.35,42 A 22,22 0 1,0 162.35,86 A 22,22 0 1,0 162.35,42 Z M 162.35,114 A 22,22 0 1,0 162.35,158 A 22,22 0 1,0 162.35,114 Z M 100,150 A 22,22 0 1,0 100,194 A 22,22 0 1,0 100,150 Z M 37.65,114 A 22,22 0 1,0 37.65,158 A 22,22 0 1,0 37.65,114 Z M 37.65,42 A 22,22 0 1,0 37.65,86 A 22,22 0 1,0 37.65,42 Z"></path></svg>`;
            } else {
                btn.innerHTML = isClassicCube ? '<i class="fas fa-cube"></i>' : '<i class="fas fa-dice-d6"></i>';
            }
        }

        function fillBgOptions() { const sel = document.getElementById('bgSelect'); const cur = sel.value; sel.innerHTML = ''; for(let i=1; i<=5; i++) { const opt = document.createElement('option'); opt.value = 'bg' + i; opt.innerText = translations[currentLang]['bg' + i]; if(opt.value === cur) opt.selected = true; sel.appendChild(opt); } }
        function fillModeOptions() { const sel = document.getElementById('modeSelect'); const val = sel.value; sel.innerHTML = `<option value="dots">${translations[currentLang].modeDots}</option><option value="numbers">${translations[currentLang].modeNums}</option><option value="yesno">${translations[currentLang].modeYN}</option><option value="trader">${translations[currentLang].modeTrader}</option><option value="alco">${translations[currentLang].modeAlco}</option>`; if(val && val !== 'roulette') sel.value = val; }
        function changeBackground() { const theme = bgThemes[document.getElementById('bgSelect').value || 'bg1']; document.body.style.background = theme.grad; }
        
        function toggleSettings(show) { 
            document.getElementById('settingsOverlay').style.display = show ? 'flex' : 'none'; 
            document.getElementById('st-mode-row').style.display = isRouletteMode ? 'none' : 'flex'; 
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
        }

        function toggleRules(show) { 
            if (show) {
                rulesContentText.innerHTML = isRouletteMode ? translations[currentLang].rulesTextRoulette : translations[currentLang].rulesTextDice;
                document.getElementById('rulesOverlay').style.display = 'flex'; 
            } else {
                document.getElementById('rulesOverlay').style.display = 'none'; 
            }
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); 
        }
        
        function changeLanguage() { 
            currentLang = document.getElementById('langSelect').value; const t = translations[currentLang]; document.documentElement.lang = currentLang;
            const titleEl = document.getElementById('ui-title'); titleEl.innerText = isRouletteMode ? t.titleRoulette : t.title;
            userInput.placeholder = t.placeholder; document.getElementById('st-title-h2').innerText = t.stTitle; document.getElementById('st-btn-close').innerText = t.stClose; document.getElementById('st-label-mode').innerText = t.stMode; document.getElementById('st-label-bg').innerText = t.stBg; document.getElementById('st-label-sparkles').innerText = t.stSparkles; document.getElementById('st-label-debug').innerText = t.stDebug; document.getElementById('st-label-lang').innerText = t.stLang; document.getElementById('st-hist-head').innerText = isRouletteMode ? t.histSurvHead : t.histDiceHead;
            document.getElementById('rules-title-h2').innerText = t.ruTitleRules; document.getElementById('ru-btn-close').innerText = t.stClose;
            if(!rollBtn.disabled) rollBtn.innerText = t.rollBtn; 
            if(!ansContent.classList.contains('visible')) ansStatus.innerText = isQuestionHidden ? t.idleNoQ : t.idle;
            fillModeOptions(); fillBgOptions(); updateModeDisplay();
        }
        
        changeLanguage(); changeBackground(); 
        ansStatus.innerText = isQuestionHidden ? translations[currentLang].idleNoQ : translations[currentLang].idle; ansStatus.classList.add('visible');
    </script>
</body>
</html>
