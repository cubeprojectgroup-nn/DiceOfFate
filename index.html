<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кость Судьбы: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --magic-color: #a29bfe;
            --friendly-green: #ccffcc;
            --angry-red: #ff6666;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 5px;
            background: radial-gradient(circle at center, #111b27 0%, #030508 100%);
            background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow-y: auto; position: relative; overflow-x: hidden;
            transition: background 1s ease;
        }

        /* СКРОЛЛБАР */
        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .history::-webkit-scrollbar-thumb { background: rgba(162, 155, 254, 0.3); border-radius: 10px; }

        .stars-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; pointer-events: none; opacity: 0; transition: opacity 1s ease; z-index: -100; }
        .stars-active { opacity: 1; background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; }

        .top-bar { display: flex; justify-content: center; gap: 20px; margin: 5px 0 2px 0; z-index: 100; }
        .icon-btn { background: rgba(162, 155, 254, 0.1); border: none; color: var(--magic-color); font-size: 22px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; }
        .icon-btn.active-white { color: #ffffff !important; text-shadow: 0 0 15px #ffffff; background: rgba(255, 255, 255, 0.2); }
        .icon-btn.active-magic { color: #ffffff !important; text-shadow: 0 0 10px white; background: rgba(162, 155, 254, 0.3); }

        h1 { font-size: 32px; letter-spacing: 2px; margin: 10px 0 5px 0; color: var(--magic-color); text-shadow: 0 0 10px var(--magic-color); font-weight: bold; text-transform: uppercase; }
        
        .input-section { width: 90%; max-width: 350px; position: relative; z-index: 110; transition: all 0.5s ease; max-height: 100px; opacity: 1; margin: 10px 0 5px 0; overflow: hidden; }
        .input-section.hidden { max-height: 0; opacity: 0; margin: 0; pointer-events: none; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 25px; border: 2px solid var(--magic-color); background: rgba(255, 255, 255, 0.05); color: white; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; }

        #error-msg { height: 20px; font-size: 16px; color: var(--friendly-green); margin-top: 5px; opacity: 0; transition: opacity 0.3s; font-weight: bold; pointer-events: none; text-shadow: 0 0 8px var(--friendly-green); }
        .error-visible { opacity: 1 !important; }
        .error-pulse-active { animation: error-vibe 0.8s infinite; }
        @keyframes error-vibe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* v0.7.2: СТИЛИ ОТВЕТА */
        #answer-box { height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 2px 0; font-weight: bold; position: relative; z-index: 100; }
        .idle-mode { font-size: 18px; animation: color-cycle 6s infinite ease-in-out; }
        .answer-main { line-height: 1.1; font-size: 32px; text-transform: uppercase; }
        .answer-sub { font-size: 16px; opacity: 0.9; margin-top: 4px; font-weight: normal; }

        @keyframes color-cycle { 0%, 100% { color: var(--friendly-green); text-shadow: 0 0 8px var(--friendly-green); } 50% { color: var(--angry-red); text-shadow: 0 0 8px var(--angry-red); } }

        .stage { position: relative; width: 100%; height: 240px; display: flex; justify-content: center; align-items: center; perspective: 1200px; z-index: 50; margin: 5px 0; }
        .scene { width: 120px; height: 120px; position: relative; z-index: 60; transform-style: preserve-3d; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1), scale 0.6s ease-out; transform: rotateX(-20deg) rotateY(20deg); }
        
        .face { 
            position: absolute; width: 120px; height: 120px; background: rgba(26, 26, 46, 0.98); border: 2px solid var(--magic-color); display: flex; align-items: center; justify-content: center; 
            font-size: 55px; font-weight: bold; border-radius: 22px; box-shadow: inset 0 0 20px rgba(162, 155, 254, 0.4); 
            color: white; transition: background 2s ease, border 2s ease, color 0.5s ease; backface-visibility: visible; overflow: hidden;
        }
        .cube.classic-mode .face { background: #ffffff !important; color: #000000; border: 1px solid #ccc !important; box-shadow: none !important; text-shadow: none; opacity: 1 !important; }

        .f1 { transform: rotateY(0deg) translateZ(60px); } .f2 { transform: rotateX(-90deg) translateZ(60px); }
        .f3 { transform: rotateY(-90deg) translateZ(60px); } .f4 { transform: rotateY(90deg) translateZ(60px); }
        .f5 { transform: rotateX(90deg) translateZ(60px); } .f6 { transform: rotateY(180deg) translateZ(60px); }

        .dot-container { display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); width: 80%; height: 80%; padding: 5px; pointer-events: none; }
        .dot { background: currentColor; border-radius: 50%; width: 18px; height: 18px; align-self: center; justify-self: center; }

        .sparkle { position: absolute; width: 5.3px; height: 5.3px; border-radius: 50%; opacity: 0; pointer-events: none; top: 50%; left: 50%; z-index: 10; }
        @keyframes sparkle-fly { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(var(--fly-x), var(--fly-y)) scale(0); } }

        .btn-roll { padding: 12px 50px; font-size: 16px; background: var(--magic-color); border: none; color: #000; border-radius: 50px; font-weight: bold; text-transform: uppercase; z-index: 110; box-shadow: 0 0 15px rgba(162, 155, 254, 0.3); transition: 0.4s; min-width: 260px; margin: 10px 0; }
        .btn-roll:disabled { background: #4a457e; animation: color-cycle 3s infinite ease-in-out, pulse-btn 1.5s infinite ease-in-out; }
        @keyframes pulse-btn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .history-header { margin-top: 15px; width: 100%; max-width: 350px; border-top: 1px solid rgba(162, 155, 254, 0.2); padding-top: 10px; text-align: center; color: var(--magic-color); font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .history { width: 100%; max-width: 350px; text-align: center; color: #888; overflow-y: auto; max-height: 120px; padding: 5px; flex-grow: 1; }
        .history-item { padding: 10px 0; font-size: 12px; position: relative; line-height: 1.4; }
        .history-item:not(:last-child):after { content: ""; position: absolute; bottom: 0; left: 10%; width: 80%; height: 1px; background: linear-gradient(to right, transparent, rgba(162, 155, 254, 0.15), transparent); }

        .settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .settings-modal { background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.2); padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; font-size: 15px; text-align: left; }
        .st-select { background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--magic-color); border-radius: 10px; padding: 5px; outline: none; width: 140px; font-family: inherit; }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.4); transition: .4s; border-radius: 34px; border: 1px solid var(--magic-color); }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 3px; background-color: var(--magic-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--magic-color); }
        input:checked + .slider:before { transform: translateX(20px); background-color: #fff; }

        .close-btn { margin-top: 15px; background: var(--magic-color); border: none; color: #000; padding: 10px 30px; border-radius: 20px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; }

        .version { position: fixed; bottom: 5px; right: 8px; font-size: 10px; color: rgba(255, 255, 255, 0.15); pointer-events: none; z-index: 200; }
        .author-link { position: fixed; bottom: 5px; left: 8px; font-size: 10px; color: rgba(255, 255, 255, 0.15); text-decoration: none; z-index: 200; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="stars" class="stars-layer stars-active"></div>
    <div class="version">v0.7.2</div>
    <a href="https://t.me/Antis_Corpus" class="author-link">t.me/Antis_Corpus</a>

    <div class="top-bar">
        <button class="icon-btn" id="cubeBtn" onclick="toggleCubeStyle()"><i class="fas fa-dice-d6"></i></button>
        <button class="icon-btn" id="toggleQuestionBtn" onclick="toggleQuestionField()"><i class="fas fa-question-circle"></i></button>
        <button class="icon-btn" id="soundBtn" onclick="toggleSound()"><i class="fas fa-volume-up"></i></button>
        <button class="icon-btn" onclick="toggleSettings(true)"><i class="fas fa-cog"></i></button>
    </div>

    <h1 id="ui-title">Кость Судьбы</h1>
    <div class="input-section" id="inputWrapper"><input type="text" id="userQuestion" placeholder="Введи вопрос судьбе..." autocomplete="off"><div id="error-msg">Сперва задай вопрос оракулу!</div></div>

    <div class="stage" id="mainStage"><div class="scene"><div id="cube" class="cube">
        <div class="face f1" id="face1"></div><div class="face f2" id="face2"></div><div class="face f3" id="face3"></div>
        <div class="face f4" id="face4"></div><div class="face f5" id="face5"></div><div class="face f6" id="face6"></div>
    </div></div></div>
    
    <div id="answer-box" class="idle-mode">Оракул ждет вопроса...</div>
    <button class="btn-roll" id="rollBtn" onclick="askOracle()">Испытать судьбу</button>

    <div class="history-header" id="st-hist-head">История предсказаний</div>
    <div class="history" id="historyBlock"><div id="historyList"></div></div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <h2 id="st-title-h2" style="margin-top:0; color:var(--magic-color)">Настройки</h2>
            <div class="setting-item"><span id="st-label-mode">Режим кости</span><select class="st-select" id="modeSelect" onchange="updateCubeFaces()"><option value="dots">Точки</option><option value="numbers">Числа</option><option value="yesno">Да/Нет</option></select></div>
            <div class="setting-item"><span id="st-label-bg">Фон</span><select class="st-select" id="bgSelect" onchange="changeBackground()"></select></div>
            <div class="setting-item"><span id="st-label-sparkles">Магические искры</span><label class="switch"><input type="checkbox" id="sparkleToggle" checked><span class="slider"></span></label></div>
            <div class="setting-item"><span id="st-label-lang">Язык</span><select class="st-select" id="langSelect" onchange="changeLanguage()"><option value="ru">Русский</option><option value="en">English</option></select></div>
            <button class="close-btn" id="st-btn-close" onclick="toggleSettings(false)">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const cube = document.getElementById('cube'), ans = document.getElementById('answer-box'), rollBtn = document.getElementById('rollBtn');
        const historyList = document.getElementById('historyList'), userInput = document.getElementById('userQuestion'), errorMsg = document.getElementById('error-msg');
        const toggleQuestionBtn = document.getElementById('toggleQuestionBtn'), mainStage = document.getElementById('mainStage');

        let isSoundEnabled = true, isClassicCube = false, currentLang = 'ru', currentFaces = [], rolls = 0, isQuestionHidden = false;

        const translations = {
            ru: { title: "Кость Судьбы", placeholder: "Введи вопрос судьбе...", error: "Сперва задай вопрос оракулу!", idle: "Оракул ждет вопроса...", waiting: "Судьба решает...", rollBtn: "Испытать судьбу", fateThrow: "Бросок Судьбы", stTitle: "Настройки", stMode: "Режим кости", stSparkles: "Магические искры", stLang: "Язык", stClose: "Закрыть", stBg: "Фон", bg1: "Глубокий Космос", bg2: "Изумрудный Лес", bg3: "Аметистовая Ночь", bg4: "Океанская Бездна", bg5: "Тень Оракула", yes: "ДА", no: "НЕТ", stHist: "История предсказаний" },
            en: { title: "Dice of Fate", placeholder: "Ask your destiny...", error: "Ask the oracle first!", idle: "Oracle is waiting...", waiting: "Fate is deciding...", rollBtn: "Try your fate", fateThrow: "Fate Throw", stTitle: "Settings", stMode: "Dice Mode", stSparkles: "Magic Sparkles", stLang: "Language", stClose: "Close", stBg: "Background", bg1: "Deep Space", bg2: "Emerald Forest", bg3: "Amethyst Night", bg4: "Ocean Abyss", bg5: "Oracle Shadow", yes: "YES", no: "NO", stHist: "Prediction History" }
        };

        const bgThemes = { bg1: { grad: "radial-gradient(circle at center, #111b27 0%, #030508 100%)", stars: true }, bg2: { grad: "linear-gradient(to bottom, #143a24 0%, #051109 100%)", stars: false }, bg3: { grad: "radial-gradient(circle at center, #2a1b35 0%, #0f0914 100%)", stars: false }, bg4: { grad: "radial-gradient(circle at center, #1b2a35 0%, #091014 100%)", stars: false }, bg5: { grad: "radial-gradient(circle at center, #111111 0%, #000000 100%)", stars: false } };
        const resData = { ru: [ {t:"НЕТ...", s:"Слабо"}, {t:"ДА...", s:"Неуверенно"}, {t:"НЕТ.", s:"Средне"}, {t:"ДА!", s:"Средне"}, {t:"НЕТ!!!", s:"Максимально"}, {t:"ДА!!!", s:"Абсолютно"} ], en: [ {t:"NO...", s:"Weakly"}, {t:"YES...", s:"Unsure"}, {t:"NO.", s:"Medium"}, {t:"YES!", s:"Medium"}, {t:"NO!!!", s:"Absolutely"}, {t:"YES!!!", s:"Absolutely"} ] };

        function playSoundEffect(type, isSuccess = false) {
            if (!isSoundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(), g = ctx.createGain();
                if (type === 'click') {
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'result') {
                    osc.frequency.setValueAtTime(isSuccess ? 880 : 220, ctx.currentTime);
                    g.gain.setValueAtTime(isSuccess ? 0.24 : 1.0, ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                    osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 1);
                }
            } catch(e) {}
        }

        userInput.addEventListener('input', () => { 
            errorMsg.classList.remove('error-visible', 'error-pulse-active');
        });

        function updateCubeFaces() {
            const mode = document.getElementById('modeSelect').value, t = translations[currentLang];
            currentFaces = []; const ynOrder = [t.no, t.yes, t.no, t.yes, t.no, t.yes];
            for(let i=1; i<=6; i++) {
                const face = document.getElementById(`face${i}`);
                face.style.textShadow = ""; face.style.color = isClassicCube ? "#000" : "#fff";
                if(mode === 'yesno') { face.innerHTML = ynOrder[i-1]; face.style.fontSize = "32px"; currentFaces.push(ynOrder[i-1]); }
                else if(mode === 'numbers') { face.innerHTML = i; face.style.fontSize = "55px"; currentFaces.push(i); }
                else if(mode === 'dots') {
                    const dotPatterns = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
                    let dots = '<div class="dot-container">';
                    for(let j=0; j<9; j++) dots += dotPatterns[i].includes(j) ? '<div class="dot"></div>' : '<div></div>';
                    face.innerHTML = dots + '</div>'; currentFaces.push(i);
                }
            }
        }

        function askOracle() {
            const q = userInput.value.trim(), t = translations[currentLang], dMode = document.getElementById('modeSelect').value;
            if (!isQuestionHidden && !q) {
                if (errorMsg.classList.contains('error-visible')) errorMsg.classList.add('error-pulse-active');
                else errorMsg.classList.add('error-visible');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                return;
            }
            playSoundEffect('click'); rollBtn.disabled = true; rollBtn.innerText = t.waiting; ans.className = ''; ans.innerHTML = "";
            updateCubeFaces();
            const rollDuration = 6000 + Math.random() * 2000;
            cube.style.transition = `transform ${rollDuration/1000}s cubic-bezier(0.15, 0, 0.15, 1), scale 0.6s ease-out`;
            cube.style.scale = "1.45"; setTimeout(() => cube.style.scale = "1", 600);
            const originalQuestion = q; if (!isQuestionHidden) userInput.value = ''; 
            if (document.getElementById('sparkleToggle').checked) { for (let i = 0; i < 200; i++) createSparkle(); }
            rolls++;
            const rIdx = Math.floor(Math.random() * 6);
            const targetRots = [{x:0,y:0},{x:90,y:0},{x:0,y:90},{x:0,y:-90},{x:-90,y:0},{x:0,y:180}];
            const offX = (Math.random() * 50 - 25), offY = (Math.random() * 50 - 25);
            cube.style.transform = `rotateX(${rolls*3600 + targetRots[rIdx].x + offX}deg) rotateY(${rolls*3600 + targetRots[rIdx].y + offY}deg)`;
            setTimeout(() => {
                const isSuccess = (rIdx % 2 !== 0), uiColor = isSuccess ? "#ccffcc" : "#ff6666";
                ans.className = 'final-answer'; ans.style.color = uiColor; ans.style.textShadow = isClassicCube ? "none" : `0 0 10px ${uiColor}`;
                const f = document.getElementById(`face${rIdx + 1}`);
                f.style.color = isSuccess ? "var(--friendly-green)" : "var(--angry-red)";
                f.style.textShadow = isClassicCube ? "none" : `0 0 15px ${uiColor}`;
                const localRes = resData[currentLang][rIdx];
                // ПРИМЕНЕНИЕ СТИЛЕЙ ОТВЕТА
                if (dMode !== 'yesno') {
                    ans.innerHTML = `<div class="answer-main">${localRes.t}</div><div class="answer-sub">${localRes.s}</div>`;
                } else {
                    ans.innerHTML = `<div class="answer-main">${currentFaces[rIdx]}</div>`;
                }
                playSoundEffect('result', isSuccess);
                const item = document.createElement('div'); item.className = 'history-item'; 
                const hQuestion = isQuestionHidden ? "---" : originalQuestion;
                let historyAnswerText = dMode==='yesno' ? currentFaces[rIdx] : `${localRes.t} (${localRes.s})`;
                item.innerHTML = `<span style="color:#fff; font-weight:bold;">?</span> <span style="color:#aaa; font-size:11px;">[${document.getElementById('modeSelect').options[document.getElementById('modeSelect').selectedIndex].text}]</span> ${hQuestion}<br><span style="color:${uiColor};">➔ ${historyAnswerText}</span>`;
                historyList.prepend(item); rollBtn.disabled = false; rollBtn.innerText = translations[currentLang].rollBtn;
                setTimeout(() => { if(!rollBtn.disabled) { ans.className = 'idle-mode'; ans.innerHTML = isQuestionHidden ? translations[currentLang].fateThrow : translations[currentLang].idle; } }, 3000);
            }, rollDuration);
        }

        function createSparkle() {
            const s = document.createElement('div'); s.className = 'sparkle'; mainStage.appendChild(s); 
            const angle = Math.random() * Math.PI * 2, dist = 130 + Math.random() * 120;
            s.style.background = Math.random() > 0.5 ? '#e0ffe0' : '#ffe0e0';
            s.style.setProperty('--fly-x', `${Math.cos(angle)*dist}px`); s.style.setProperty('--fly-y', `${Math.sin(angle)*dist}px`);
            const dur = 4.0 + Math.random() * 2.0; s.style.animation = `sparkle-fly ${dur}s ease-out forwards`;
            setTimeout(() => s.remove(), dur * 1000);
        }

        function toggleQuestionField() {
            isQuestionHidden = !isQuestionHidden;
            document.getElementById('inputWrapper').classList.toggle('hidden', isQuestionHidden);
            const icon = toggleQuestionBtn.querySelector('i');
            toggleQuestionBtn.classList.toggle('active-magic', isQuestionHidden);
            if (isQuestionHidden) { 
                icon.className = 'fas fa-comment-slash'; 
                ans.innerHTML = translations[currentLang].fateThrow; 
            } else { 
                icon.className = 'fas fa-question-circle'; 
                ans.innerHTML = translations[currentLang].idle; 
            }
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value; const t = translations[currentLang];
            document.getElementById('ui-title').innerText = t.title; userInput.placeholder = t.placeholder;
            errorMsg.innerText = t.error; rollBtn.innerText = rollBtn.disabled ? t.waiting : t.rollBtn;
            document.getElementById('st-btn-close').innerText = t.stClose;
            document.getElementById('st-title-h2').innerText = t.stTitle;
            document.getElementById('st-label-mode').innerText = t.stMode;
            document.getElementById('st-label-sparkles').innerText = t.stSparkles;
            document.getElementById('st-label-lang').innerText = t.stLang;
            document.getElementById('st-label-bg').innerText = t.stBg;
            document.getElementById('st-hist-head').innerText = t.stHist;
            fillBgOptions(); updateCubeFaces();
            if (!rollBtn.disabled) { ans.className = 'idle-mode'; ans.innerHTML = isQuestionHidden ? t.fateThrow : t.idle; }
        }

        function fillBgOptions() {
            const sel = document.getElementById('bgSelect'); const currentVal = sel.value || 'bg1'; sel.innerHTML = '';
            for(let i=1; i<=5; i++) {
                const opt = document.createElement('option'); opt.value = 'bg' + i;
                opt.innerText = translations[currentLang]['bg' + i]; if(opt.value === currentVal) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        function changeBackground() {
            const themeId = document.getElementById('bgSelect').value || 'bg1';
            const theme = bgThemes[themeId]; document.body.style.background = theme.grad;
            const stars = document.getElementById('stars');
            if (theme.stars) stars.classList.add('stars-active'); else stars.classList.remove('stars-active');
        }

        function toggleSettings(show) { document.getElementById('settingsOverlay').style.display = show ? 'flex' : 'none'; }
        function toggleSound() { isSoundEnabled = !isSoundEnabled; document.getElementById('soundBtn').innerHTML = isSoundEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>'; }
        function toggleCubeStyle() { isClassicCube = !isClassicCube; cube.classList.toggle('classic-mode', isClassicCube); document.getElementById('cubeBtn').classList.toggle('active-white', isClassicCube); updateCubeFaces(); }
        
        fillBgOptions(); updateCubeFaces(); changeBackground();
    </script>
</body>
</html>
